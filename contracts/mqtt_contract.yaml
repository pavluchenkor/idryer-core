version: 3
updated: "2026-04-30"
owner: "idryer-core"
scope: |
  Полный протокол iDryer: MQTT (устройство ↔ облако) + UART (RP2040 ↔ ESP32 bridge).
  Один источник правды для обеих сторон. Каждое сообщение, у которого есть и MQTT-,
  и UART-форма, описано через bindings; чисто-MQTT и чисто-UART — отдельными секциями.

# ─────────────────────────────────────────────────────────────────────────────
# Источники правды
# ─────────────────────────────────────────────────────────────────────────────
source_of_truth:
  code:
    # idryer-core (актуальная SDK на ESP32)
    - "lib/idryer-core/src/mqtt/idryer_topics.h"
    - "lib/idryer-core/src/mqtt/mqtt_client.h"
    - "lib/idryer-core/src/mqtt/mqtt_client.cpp"
