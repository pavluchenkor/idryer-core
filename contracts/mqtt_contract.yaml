# ─────────────────────────────────────────────────────────────────────────────
# Общие правила
# ─────────────────────────────────────────────────────────────────────────────
rules:
  topic_prefix: "idryer/{serial}/"
  command_subscription: "idryer/{serial}/commands/#"
  serial_format:
    pattern: "DEVICE_[0-9A-F]{12}"
    description: |
      Серийник устройства. 12 hex-символов в UPPERCASE с префиксом DEVICE_.
      Источник правды — ядро (ESP32 SDK): `ArduinoCredentialStore::seedSerialFromMac()`
      использует `snprintf("%02X", mac[i])`. Все компоненты (ESP firmware, портал-backend,
      portal-frontend, MQTT topic, БД Device.serialNumber, JSON-payload поля `serial`/`serialNumber`)
      хранят и сравнивают строку как есть — БЕЗ нормализации регистра.
    example: "DEVICE_ACEBE6490534"
    source_ref: "lib/idryer-core/src/platform/arduino/ArduinoCredentialStore.cpp:75"
  timestamp_format: "YYYY-MM-DDTHH:MM:SSZ"
  lwt_topic: "idryer/{serial}/offline"
  max_payload_bytes: 16384
  config_chunk_threshold_bytes: 16000
  unit_id_format: "string U1..U4 (по соглашению портала); внутри MCU — uint8_t 0..3. ИСКЛЮЧЕНИЕ: info.units[].unitId — numeric 0..3 (исторически; так шлют iHeater-link и legacy dryer; Portal InfoPayload type тоже numeric)."

  mqtt_session: "clean_session=false; keepalive=60s"
  publish_qos: "PubSubClient в idryer-core/idryer-link публикует ВСЕГДА QoS 0 (PubSubClient::publish() не имеет publish-QoS параметра). Поэтому ВСЕ device→backend MQTT entries в этом контракте имеют qos: 0. Subscribe (commands/*) — QoS 1. LWT (offline) — broker-side."
  uart_baud: 115200
  uart_protocol_version: 1
  uart_max_payload_bytes: 200
  uart_max_retries: 3
  uart_cmd_timeout_ms: 700
  uart_heartbeat_interval_ms: 5000
  uart_link_loss_ms: 20000

  compatibility_policy:
    - "Любое изменение MQTT/UART — сначала в этом файле, потом в коде."
    - "Новый topic / UART kind / invoke action — сначала появляется здесь."
    - "Расхождения между источниками не скрываются: фиксируются в notes и в mismatches.md."

  timestamp_convention:
    description: |
      Поле `timestamp` (ISO 8601 UTC, формат `YYYY-MM-DDTHH:MM:SS.sssZ` или `YYYY-MM-DDTHH:MM:SSZ`)
      — конвенция протокола, применяется в обе стороны:

        portal → device: добавляется во все `commands/*` payload'ы (включая ping).
        device → portal: автоматически добавляется во все publish-сообщения через
                         generic `MqttClient::publishJson()`, если не задан явно.

      Назначение для устройства: settimeofday() при получении любой portal-команды.
      RTC-времени на железе нет; NTP не используется. Time-sync целиком построен
      на этой конвенции. До первой portal-команды время = 1970-01-01 (TLS handshake
      работает: ESP32 mbedtls в этой сборке не валидирует cert validity period).

    field: "timestamp"
    format: "ISO 8601 UTC (`YYYY-MM-DDTHH:MM:SS[.sss]Z`)"

    portal_to_device:
      coverage: "ВСЕ commands/* кроме `bambu_apply` и `link_integration` (config-команды без time-sync semantics)."
      added_by: "Каждый portal-сервис ручно при формировании payload (НЕ через global interceptor)."
      source_ref: |
        iDryerPortal/backend/src/mqtt-telemetry/mqtt-telemetry.service.ts:635 (drying), :658 (storage),
        :682 (profile), :761 (stop), :775 (pause), :789 (resume), :802 (ping);
        backend/src/devices/devices.service.ts:1271 (get_config), :1339 (set/invoke);
        backend/src/rfid/write-orchestrator.service.ts:219 (write_rfid);
        backend/src/mqtt-telemetry/handlers/rfid.handler.ts:333 (read_rfid);
        backend/src/gateway/events.gateway.ts:342 (find / clear_errors).

    device_to_portal:
      coverage: "ВСЕ publish-сообщения (info, telemetry, status, weights, rfid, config, config/delta, events, integrations/status)."
      added_by: "MqttClient::publishJson() — generic wrapper, который добавляет timestamp если отсутствует."
      source_ref: |
        legacy: idryer-protocol/src/mqtt/mqtt_client.cpp:599-602 (generic), :340 (publishInfo).
        new SDK: idryer-core/src/mqtt/mqtt_client.cpp:254-256 (generic).

    device_incoming_parsing:
      where: "IdryerRuntime::onMqttCommand на верхнем уровне ДО роутинга (idryer_runtime.cpp:46-66)."
      effect: "settimeofday() при наличии валидного timestamp в любой portal-команде."
      excludes:
        - "Local-WS команды (приходят через local_access::setCommandSink, минуют onMqttCommand) — клиент сам знает своё время, не должен менять системное."
        - "UART команды от RP2040 — то же самое, RP2040 синхронизируется через ESP, не наоборот."
      legacy_behavior: |
        В legacy idryer-protocol парсинг был в CommandHandler::handleMqttCommand (command_handler.cpp:39-40
        → syncTimeIfPresent) — тот же контракт. В iHeater-link/idryer-core поведение восстановлено.

# ─────────────────────────────────────────────────────────────────────────────
# Статус миграции продуктов на menu_protocol_v1
# Согласно ___capabilities_and_menu_as_protocol.md §10.6
# ─────────────────────────────────────────────────────────────────────────────
migration_status:
  iheater_link:
    target:  menu_protocol_v1
    status:  in_progress
    actions:
      - "Добавить r: в menu.yaml для mat_petg/mat_pla/mat_pacf, *_en"
      - "Удалить ручные обработки link_integration / bambu_apply из main.cpp"
      - "Команды переезжают в commands/set + commands/invoke"

  storage_link:
    target:  menu_protocol_v1
    status:  in_progress
    actions:
      - "Добавить r: в menu.yaml для led_count, brightness, animation"
      - "Добавить пункт act с r: led.pulse, widget: LedPulse"
      - "Backend mapDeviceType: добавить case 'storage_link'"

  dryer:
    target:  menu_protocol_v1
    status:  deferred
    note: |
      Сушилка работает в проде. Миграция отдельной задачей после стабилизации
      iHeater Link и Storage Link на новой модели. До этого момента сушилка
      продолжает использовать legacy-формат (top-level топики команд:
      commands/drying, commands/storage, commands/profile, commands/read_rfid,
      commands/write_rfid и т.п.) и старые messages-секции этого файла.
    legacy_format_kept:
      - "commands/drying"
      - "commands/storage"
      - "commands/profile"
      - "commands/stop"
      - "commands/find"
      - "commands/clear_errors"
      - "commands/read_rfid"
      - "commands/write_rfid"
      - "weights"
      - "rfid"

# ─────────────────────────────────────────────────────────────────────────────
# Канонические роли — закрытый словарь menu_protocol_v1
# Подробности — ___capabilities_and_menu_as_protocol.md §8
# ─────────────────────────────────────────────────────────────────────────────
canonical_roles:
  # Каждая роль описывает:
  #   type        — тип данных (float/uint/bool/action)
  #   unit        — единица измерения (опционально, для UI)
  #   widget      — какой UI-компонент рисовать на портале
  #                   стандартные: slider | number | toggle | select | button | hidden
  #                   хардкод: ProfileEditor | RfidWriter | LedPulse | ...
  #   args_schema — для actions с runtime-параметрами (опционально)
  #
  # Default-виджет берётся по типу пункта меню если widget не задан в роли:
  #   menu type:val             → slider (если есть min/max) или number
  #   menu type:val + select_options → select
  #   menu type:toggle          → toggle
  #   menu type:act             → button

  # ── Сушилка (Dryer) — в статусе deferred ─────────────────────────────────
  drying.target_temperature:    { type: float, unit: "°C",  widget: slider }
  drying.duration:              { type: uint,  unit: "min", widget: slider }
  drying.start:                 { type: action, widget: button }
  drying.stop:                  { type: action, widget: button }

  storage.target_temperature:   { type: uint,  unit: "°C",  widget: slider }
  storage.target_humidity:      { type: uint,  unit: "%RH", widget: slider }
  storage.start:                { type: action, widget: button }
  storage.stop:                 { type: action, widget: button }

  profile.start:                { type: action, widget: ProfileEditor,
                                  args_schema: { stages: array_of_stages } }
  profile.stop:                 { type: action, widget: button }

  rfid.read:                    { type: action, widget: button,
                                  args_schema: { readerId: int } }
  rfid.write:                   { type: action, widget: RfidWriter,
                                  args_schema: { tagData: base64_888B } }

  # ── iHeater Link — в статусе in_progress ─────────────────────────────────
  iheater.material_petg:        { type: uint,  unit: "°C", widget: slider }
  iheater.material_pla:         { type: uint,  unit: "°C", widget: slider }
  iheater.material_pacf:        { type: uint,  unit: "°C", widget: slider }
  iheater.bambu_enabled:        { type: bool,  widget: toggle }
  iheater.moonraker_enabled:    { type: bool,  widget: toggle }
  iheater.ha_enabled:           { type: bool,  widget: toggle }

  # ── Storage Link — в статусе in_progress ─────────────────────────────────
  storage.led_count:            { type: uint,  widget: number }
  storage.led_brightness:       { type: uint,  widget: slider }
  storage.led_animation:        { type: uint,  widget: select }
  led.pulse:                    { type: action, widget: LedPulse,
                                  args_schema: { ledIndex: int,
                                                 color: rgb,
                                                 durationMs: uint } }

  # ── Общие действия (для всех продуктов) ──────────────────────────────────
  common.stop:                  { type: action, widget: button }
  common.find:                  { type: action, widget: button }
  common.clear_errors:          { type: action, widget: button }

  # ── Системное ────────────────────────────────────────────────────────────
  system.active_unit:           { type: uint, widget: hidden }
  system.language:              { type: uint, widget: select }

# ─────────────────────────────────────────────────────────────────────────────
# Карта диапазонов UART kind_id (для удобства аудитора)
# ─────────────────────────────────────────────────────────────────────────────
uart_kind_ranges:
  "0x01-0x02": "Service / Handshake (Hello / HelloAck)"
  "0x10-0x14": "Telemetry / Sensors (Telemetry/Ack, Weights, Status, Rfid)"
  "0x1A-0x1B": "RFID Data (фрагментированные)"
  "0x20-0x21": "Commands (Command, CommandAck)"
  "0x30-0x31": "Config (ConfigPush, ConfigAck)"
  "0x40": "Heartbeat"
  "0x50": "Error"
  "0x60": "Log (диагностика)"
  "0x70-0x72": "Claiming (ClaimStart / ClaimStatus / ClaimComplete)"
  "0x73-0x76": "WebSocket Local Access (WsEnable / WsStatus / WsResetClients / WsStatusRequest)"

# ─────────────────────────────────────────────────────────────────────────────
# Перечисления (enum) — копируются 1:1 из uart_protocol.h
# ─────────────────────────────────────────────────────────────────────────────
enums:
  UartRole:
    Rp2040Controller: 0x01
    EspBridge: 0x02
    HelloRequest: 0xFF

  UartDeviceType:
    Unknown: 0x00
    Dryer: 0x01
    Heater: 0x02
    Telemetry: 0x03
    Link: 0x04
    IHeaterLink: 0x05

  UartDryerMode:
    Idle: 0
    Drying: 1
    Storage: 2
    Profile: 3
    Fault: 4

  UartStagePhase:
    Ramp: 0
    Hold: 1

  UartCmdCode:
    Start: 0x01
    Stop: 0x02
    Find: 0x03
    GetConfig: 0x05
    SetConfig: 0x06
    ReadRfid: 0x07
    WriteRfid: 0x08
    ResetFault: 0x10
    WifiStatus: 0x11
    ClearErrors: 0x12

  UartErrCode:
    None: 0x00
    CrcMismatch: 0x01
    UnknownMessage: 0x02
    InvalidPayload: 0x03
    Busy: 0x04
    Timeout: 0x05
    SequenceMismatch: 0x06

  UartClaimStatus:
    Idle: 0x00
    Provisioning: 0x01
    WaitingClaim: 0x02
    Claimed: 0x03
    Error: 0x04

  UartLinkCloudState:
    Idle: 0
    WifiConnecting: 1
    Provisioning: 2
    Registering: 3
    AwaitingClaim: 4
    Ready: 5
    MqttConnecting: 6
    Online: 7

  UartWsState:
    Disabled: 0
    Listening: 1
    Connected: 2

  UnitCaps:
    HEATER: 0x0001
    FAN: 0x0002
    SERVO: 0x0004
    RH_AIR_SENSOR: 0x0008
    TEMP_AIR_SENSOR: 0x0010
    TEMP_HTR_SENSOR: 0x0020

  UartFlags:
    ACK_REQ: 0x01
    IS_ACK: 0x02
    ERROR: 0x04
    FRAGMENT: 0x08
    LAST_FRAGMENT: 0x10

  # Используется в MQTT-payload (status.units[].mode и в handlers портала)
  # Источники:
  #   firmware (publisher): idryer-link/lib/idryer-protocol/src/cloud/telemetry_publisher.cpp:383-399 (modeToString)
  #   portal (consumer):    iDryerPortal/backend/src/mqtt-telemetry/mqtt-api.types.ts:316-323 (enum UnitStatus)
  # Канон 2026-05-01: portal приведён к firmware-семантике (ERROR удалён, UNKNOWN добавлен).
  PortalUnitStatus:
    - IDLE # юнит ждёт команд
    - DRYING # активная сушка
    - STORAGE # режим хранения
    - PROFILE # многоэтапный профиль
    - FAULT # ошибка/неисправность (закрывает сессию с reason='error')
    - UNKNOWN # fallback для незнакомого UartDryerMode (НЕ закрывает сессию)

  PortalEventType:
    - COMMAND_ACK
    - ERROR
    - WARNING
    - SESSION_COMPLETE
    - SESSION_INTERRUPTED
    - MAINTENANCE_REQUIRED

  # Link integrations (HA / Bambu / Moonraker)
  # ВАЖНО: enum имеет ДВЕ грани сериализации (см. known_mismatches.integration_state_active_serialization):
  #   - C++ enum class (для UART, локального кода): CamelCase
  #   - JSON wire form (для MQTT integrations/status): lowercase / snake_case
  # Конвертация: integrationStateToString(), activeIntegrationToString() в link_integrations_types.cpp
  IntegrationState:
    cpp_enum:
      source_ref: "lib/idryer-core/src/integrations/common/link_integrations_types.h:131-139"
      values:
        - Disabled # эта интеграция не активная
        - Idle # активна и сконфигурирована, но ещё не подключена
        - Connecting # идёт попытка подключения
        - Online # подключена и работает
        - ConfigMissing # активна, но обязательные поля пустые/невалидные
        - Error # ошибка подключения; см. lastError в integrations/status
    json_string_form:
      source_ref: "lib/idryer-core/src/integrations/common/link_integrations_types.cpp:34-45 (integrationStateToString)"
      mapping:
        Disabled: "disabled"
        Idle: "idle"
        Connecting: "connecting"
        Online: "online"
        ConfigMissing: "config_missing"
        Error: "error"

  ActiveIntegration:
    cpp_enum:
      source_ref: "lib/idryer-core/src/integrations/common/link_integrations_types.h:23-29"
      values:
        None: 0
        Ha: 1
        Bambu: 2
        Moonraker: 3
    json_string_form:
      source_ref: "lib/idryer-core/src/integrations/common/link_integrations_types.cpp:12-31 (activeIntegrationToString)"
      mapping:
        None: "none"
        Ha: "ha"
        Bambu: "bambu"
        Moonraker: "moonraker"

# ─────────────────────────────────────────────────────────────────────────────
# Общие payload-схемы (на которые ссылаются messages / invoke_actions)
# ─────────────────────────────────────────────────────────────────────────────
payloads:
  UartUnitConfig:
    description: "Конфигурация одного юнита внутри Hello.units[4]. Fixed-size 12 bytes, packed."
    source_ref: "uart_protocol.h:177-183 (UartUnitConfig, __attribute__((packed)), 12 bytes)"
    fields:
      unitId: { type: uint8, note: "Индекс юнита (0..3)." }
      _pad1:
        {
          type: uint8,
          note: "Wire-padding для выравнивания uint16 capabilities.",
        }
      capabilities:
        {
          type: uint16,
          note: "Битмаска UnitCaps (HEATER/FAN/SERVO/RH/TEMP_AIR/TEMP_HEATER + reserved). См. enums.UnitCaps.",
        }
      scales:
        {
          type: "uint8[4]",
          note: "Индексы весовых датчиков на этом юните; 0xFF = слот пустой.",
        }
      rfid:
        {
          type: "uint8[4]",
          note: "Индексы RFID-ридеров на этом юните; 0xFF = слот пустой.",
        }

  Hello:
    description: "Идентификация контроллера для bridge-ESP32; включает units[] и capabilities."
    source_ref: "uart_protocol.h:UartHelloPayload (86 bytes, packed; static_assert на размер существует)"
    fields:
      role: { type: enum, ref: UartRole }
      deviceType: { type: enum, ref: UartDeviceType }
      _pad1:
        {
          type: "uint8[2]",
          note: "wire-padding между deviceType и firmwareVersion для выравнивания uint32",
        }
      firmwareVersion:
        { type: uint32, encoding: "MAJOR<<16 | MINOR<<8 | PATCH" }
      workTimeCounter: { type: uint32, unit: "seconds" }
      hardwareVersion: { type: "char[8]" }
      unitsCount:
        {
          type: uint8,
          range: "0..4",
          note: "Wire array units[4]; current RP2040 product subset MENU_MAX_UNITS=3, но контракт фиксирует общий 0..4 limit.",
        }
      units: { type: "UartUnitConfig[4]" }
      mcuSerial: { type: "char[17]", note: "flash ID hex + '\\0'" }

  HelloAck:
    description: "ESP32-сторона возвращает IP/SSID для отображения на экране MCU."
    source_ref: "uart_protocol.h:UartHelloAckPayload"
    fields:
      ipAddress:
        { type: uint32, encoding: "network-byte order, 0 если нет WiFi" }
      ssid: { type: "char[33]" }

  Telemetry:
    description: "Периодические показания датчиков камер."
    source_ref: "uart_protocol.h:UartTelemetryPayload (29 bytes packed = 1 byte count + 4 × 7 bytes UartTelemetryEntry)"
    fields:
      count: { type: uint8, range: "0..4" }
      units:
        type: "UartTelemetryEntry[4]"
        item_fields:
          unitId: { type: uint8, range: "0..3" }
          temperatureC10: { type: int16, unit: "°C × 10" }
          humidityPct10: { type: uint16, unit: "%RH × 10" }
          heaterPowerPct: { type: uint8, unit: "0..100 %" }
          fanOn: { type: uint8, encoding: "0/1" }

  Status:
    description: "Полное состояние юнитов: режим, цели, прогресс, этапы профиля."
    source_ref: "uart_protocol.h:UartStatusPayload (поля перечислены в порядке wire-layout)"
    fields:
      count: { type: uint8, range: "0..4" }
      units:
        type: "UartStatusEntry[4]"
        item_fields:
          unitId: { type: uint8 }
          mode: { type: enum, ref: UartDryerMode }
          sessionNum: { type: uint32 }
          targetTempC10: { type: int16, unit: "°C × 10" }
          targetHumidityPct: { type: uint16, unit: "%RH" }
          durationMinutes: { type: uint16 }
          elapsedSeconds: { type: uint32 }
          stageElapsedSeconds: { type: uint32 }
          stageRemainingSeconds: { type: uint32 }
          totalRemainingSeconds: { type: uint32 }
          currentStage: { type: uint8 }
          totalStages: { type: uint8 }
          stagePhase: { type: enum, ref: UartStagePhase }
          _pad:
            {
              type: uint8,
              note: "trailing padding для выравнивания entry; должен быть 0",
            }
      uptime:
        {
          type: uint32,
          unit: "seconds",
          note: "wire-layout: uptime идёт ПОСЛЕ units[], не до. См. uart_protocol.h:UartStatusPayload.",
        }

  Weights:
    description: "Показания весов (до 4 датчиков)."
    source_ref: "uart_protocol.h:UartWeightsPayload"
    fields:
      count:
        {
          type: uint8,
          range: "0..4",
          note: "Wire array weights[4]; producer clamp i<4.",
        }
      weights:
        type: "UartWeightEntry[4]"
        item_fields:
          sensorId: { type: uint8 }
          unitId: { type: uint8 }
          weightGramsC10: { type: uint16, unit: "g × 10" }

  Rfid:
    description: "Событие RFID-ридера: метка обнаружена / снята / ридер недоступен."
    source_ref:
      uart_struct: "lib/idryer-core/src/uart/uart_protocol.h:300-306 (UartRfidPayload — есть в core)"
      event_enum: "idryer-link/lib/idryer-protocol/src/uart/uart_protocol.h:398-403 (enum class RfidEvent — ОТСУТСТВУЕТ в core SDK; см. known_mismatches.rfid_stack_partial_in_core)"
      json_publisher: "idryer-link/lib/idryer-protocol/src/cloud/telemetry_publisher.cpp:197-233 (publishRfid) и :402-410 (rfidEventToString) — ОТСУТСТВУЮТ в core"
    fields:
      event:
        type: uint8
        enum_ref: RfidEvent
        values:
          0: "invalid / unused"
          1: "TagDetected → JSON 'tag_detected'"
          2: "TagRemoved → JSON 'tag_removed'"
          3: "ReaderUnavailable (НЕ маппится в JSON в legacy publisher — теряется на portal-стороне)"
        note: "Wire-уровневый numeric enum. JSON-форма (lowercase строка) собирается legacy publisher'ом. В core SDK enum НЕ объявлен — потребитель должен знать значения сам, либо ждать миграцию."
      readerId:
        type: uint8
        required_for_mqtt: true
        note: "Физический индекс ридера на RP2040 (0..N-1). Producer (RP2040 main.cpp:2022-2031, 2063-2067) ВСЕГДА заполняет конкретным числом для исходящих Rfid (0x14) event payload. Portal rfid.handler.ts:43-48 dropит event без readerId — поэтому REQUIRED для MQTT JSON-формы. NB: '0xFF auto-resolve by unitId' — это для ВХОДЯЩИХ RfidData write fragments (см. payloads.RfidData.fields.readerId), НЕ для Rfid event."
      tag: { type: "char[32]", note: "HEX-строка ID метки" }
      unitId:
        type: uint8
        note: "Логический индекс камеры (0..3). Маппинг reader→unit в rfidManager на RP2040, настраиваемый. Используется ВСЕМИ слоями выше UART (LINK, MQTT, portal)."
      _pad:
        {
          type: "uint8[2]",
          note: "trailing wire-padding для выравнивания структуры; должен быть 0",
        }

  RfidData:
    description: "Фрагмент данных метки (до 888 байт суммарно через несколько фрагментов)."
    source_ref: "uart_protocol.h:UartRfidDataPayload"
    fields:
      readerId:
        {
          type: uint8,
          note: "Для ВХОДЯЩИХ write-fragments LINK→RP2040 может быть 0xFF — RP2040 main.cpp:1061-1069 сам найдёт ридер по unitId. Для ИСХОДЯЩИХ read-fragments RP2040→LINK всегда заполнено конкретным значением.",
        }
      unitId:
        {
          type: uint8,
          note: "Логический индекс камеры (0..3). Используется для авто-резолва readerId на стороне RP2040.",
        }
      tag: { type: "char[32]" }
      fragment: { type: "uint8[163]" }
      _pad:
        {
          type: "uint8[2]",
          note: "trailing wire-padding до 200 байт UART_MAX_PAYLOAD",
        }

  Command:
    description: "Универсальная команда с MQTT через ESP32 на контроллер."
    source_ref: "uart_protocol.h:UartCmdPayload"
    fields:
      command: { type: enum, ref: UartCmdCode }
      targetState:
        {
          type: uint8,
          note: "целевой режим (для Start: Drying/Storage/Profile)",
        }
      unitId:
        type: uint8
        required: true
        range: "0..3 (NUM_UNITS-1)"
        note: "Конкретный юнит, обязательно. ALL/broadcast НЕ поддерживается — для действия на нескольких юнитах клиент шлёт N отдельных команд. Detail: known_mismatches.broadcast_unit_id_unsupported."
      reserved:
        {
          type: "uint8[2]",
          note: "wire-padding между unitId и arg0 для выравнивания uint32; должен быть 0",
        }
      arg0: { type: uint32 }
      arg1: { type: uint32 }

  Profile:
    description: "Многоэтапный профиль сушки (до 10 стадий)."
    source_ref: "uart_protocol.h:UartProfilePayload"
    fields:
      unitId: { type: uint8 }
      totalStages: { type: uint8, range: "1..10" }
      startStage: { type: uint8 }
      stages:
        type: "UartProfileStage[10]"
        item_fields:
          temp:
            {
              type: uint16,
              unit: "°C × 10",
              note: "wire — десятые доли °C (точность 0.1°C, диапазон 0..6553.5). Соглашение протокола: все температуры на UART как °C×10 (см. Status.targetTempC10, Telemetry.temperatureC10). RP2040 делит на 10 при использовании (uart_manager.cpp:427). Комментарий '°C' в uart_protocol.h:317 устарел.",
            }
          ramp:
            {
              type: uint16,
              unit: "seconds",
              note: "wire-level семантика — секунды; комментарий 'minutes' в lib/idryer-core/src/uart/uart_protocol.h:318-319 устарел и подлежит замене",
            }
          hold:
            {
              type: uint16,
              unit: "seconds",
              note: "wire-level семантика — секунды; см. idryer-link/lib/idryer-protocol/src/cloud/command_handler.cpp:590-605 + iDryerRP2040/src/uart/uart_manager.cpp:426-430",
            }

  Config:
    description: "Целевые параметры одного юнита (legacy ConfigPush; не фрагментированный). LEGACY/BROKEN — не использовать."
    status: legacy_broken
    source_ref:
      struct: "uart_protocol.h:241-245 (UartConfigPayload, 8 bytes)"
      broken_consumer: "iDryerRP2040/src/uart/uart_manager.cpp:907-915,921-927 — handleUartConfig копирует binary payload в chunkPayload.data и зовёт deserializeJson() на бинарных байтах. Binary struct НЕ парсится."
    fields:
      targetTemperatureC10: { type: int16, unit: "°C × 10" }
      targetHumidityPct: { type: uint16, unit: "%RH" }
      durationMinutes: { type: uint16 }
      fanDutyPct: { type: uint16 }
    notes:
      - "См. known_mismatches.config_legacy_binary_broken — current RP2040 firmware НЕ может корректно принять binary ConfigPush. Использовать ConfigPush JSON через chunked path вместо этого."

  ConfigChunk:
    description: |
      Фрагмент полного JSON-конфига меню (6-байтный заголовок + до 194 байт данных
      в одном фрейме). Сборка по transferId; финальный фрейм имеет UART_FLAG_LAST_FRAGMENT.
    source_ref: "uart_protocol.h:UartConfigChunkPayload (header = UartConfigChunkHeader, 6 bytes)"
    fields:
      transferId: { type: uint16 }
      totalSize: { type: uint16 }
      chunkIndex: { type: uint16 }
      data: { type: "uint8[194]" }

  LogPayload:
    description: "Структурированное лог-сообщение от MCU. Fixed-size binary struct (legacy DryerUart::LogPayload)."
    source_ref: "idryer-link/lib/idryer-protocol/src/uart/uart_protocol.h:301-309"
    fields:
      severity:
        {
          type: "char[10]",
          note: "null-terminated severity string ('CRIT'/'ERROR'/'WARN'/'INFO'/'DEBUG')",
        }
      source:
        {
          type: "char[20]",
          note: "origin tag (например 'MCU', 'PID', 'SENSOR')",
        }
      event: { type: "char[32]", note: "event name" }
      message: { type: "char[100]", note: "human-readable сообщение" }
      unitId:
        {
          type: uint8,
          note: "связанный юнит (0..3) или 0xFF если событие линка",
        }
    notes:
      - "Wire-форма — fixed-size binary struct. Producer (RP2040 main.cpp:1338-1354 + uart_manager.cpp:1085-1093) заполняет поля и шлёт через sendLog (raw bytes transport)."
      - "ESP32-сторона (idryer-link IdryerDevice.cpp:657-678 handleLog) парсит struct и публикует MQTT events с unitId."

  Heartbeat:
    description: "Keep-alive MCU↔ESP32 + сетевой статус для UI."
    source_ref: "uart_protocol.h:UartHeartbeatPayload"
    fields:
      uptimeSeconds: { type: uint32 }
      wifiRssiDbm:
        {
          type: int16,
          note: "RP2040 шлёт всегда 0 (нет WiFi у MCU). Реальный RSSI — ESP32→RP2040 направлении.",
        }
      errorsSinceBoot:
        {
          type: uint16,
          note: "RP2040 stub-шлёт 0 (uart_manager.cpp:347-348). Реальные счётчики ошибок ведутся на ESP32.",
        }
      cloudState:
        {
          type: enum,
          ref: UartLinkCloudState,
          note: "Имеет смысл только в направлении ESP32→RP2040 (статус облака). Когда RP2040 шлёт heartbeat, это поле = 0 (Idle).",
        }
    notes:
      - "Heartbeat двунаправленный: обе стороны шлют. Direction-specific семантика: wifiRssiDbm/errorsSinceBoot/cloudState заполняются только ESP32-стороной. RP2040 ставит в эти поля 0."

  Ack:
    description: "Подтверждение принятого фрейма."
    source_ref: "uart_protocol.h:UartAckPayload"
    fields:
      ackSequence: { type: uint8 }
      status: { type: enum, ref: UartErrCode }

  Error:
    description: "Сообщение об ошибке протокола (CRC, sequence, busy и т.п.)."
    source_ref: "uart_protocol.h:UartErrorPayload"
    fields:
      code: { type: enum, ref: UartErrCode }
      lastSequence: { type: uint8 }
      detail: { type: uint16 }

  ClaimStatus:
    description: "Статус процесса привязки устройства (PIN, оставшееся время)."
    source_ref: "uart_protocol.h:UartClaimStatusPayload"
    fields:
      status: { type: enum, ref: UartClaimStatus }
      pin: { type: "char[9]" }
      expiresAt:
        type: uint32
        unit: "unix epoch"
        optional: true
        note: "В current code-paths producer'а нет: cloud claim callback (cloud_state_machine.cpp:209-226) экспонирует только pin+remainingSeconds; reference UART forwarder (DryerDevice.cpp:84-90) шлёт expiresAt=0. См. known_mismatches.claimstatus_expiresAt_no_producer."
      remainingSeconds:
        {
          type: uint32,
          note: "Основное поле для UI. Выводится из claim-callback на стороне cloud.",
        }

  ClaimComplete:
    description: "Финальный результат claiming."
    source_ref: "uart_protocol.h:UartClaimCompletePayload"
    fields:
      success: { type: uint8, encoding: "0/1" }
      deviceId: { type: "char[37]" }

  WsEnable:
    description: "Включить/выключить локальный WS-сервер. sizeof(UartWsEnablePayload) == 4."
    source_ref: "uart_protocol.h:UartWsEnablePayload (lines 342-346)"
    fields:
      enable: { type: uint8, encoding: "0/1" }
      reserved:
        {
          type: uint8,
          note: "padding для выравнивания uint16 pin; должен быть 0",
        }
      pin: { type: uint16 }

  WsStatus:
    description: "Статус локального WS-сервера для отображения на экране. sizeof(UartWsStatusPayload) == 6."
    source_ref: "uart_protocol.h:UartWsStatusPayload (lines 354-360)"
    fields:
      state: { type: enum, ref: UartWsState }
      pin: { type: uint16 }
      pairedCount: { type: uint8 }
      maxClients: { type: uint8 }
      reserved:
        {
          type: uint8,
          note: "trailing padding для выравнивания структуры до 6 байт; должен быть 0",
        }

# ─────────────────────────────────────────────────────────────────────────────
# 1. СООБЩЕНИЯ С ОБОИМИ BINDINGS (MQTT + UART)
# ─────────────────────────────────────────────────────────────────────────────
messages:
  - name: info
    direction: device_to_backend
    purpose: |
      Идентификация устройства и его юнитов после онлайна (deviceType, firmwareVersion,
      hardwareVersion, units[]). На UART то же содержимое идёт как Hello.
    bindings:
      mqtt:
        suffix: info
        full_topic: "idryer/{serial}/info"
        producer: "IProfile::buildInfoJson() или TelemetryPublisher::publishInfo()"
        consumer: "portal/backend (info.handler.ts)"
        qos: 0
        retained: true
        interval: "once after Online; republish on commands/ping"
        payload:
          notes:
            - "Schema продукт-зависимая. idryer-core её не валидирует."
            - "Storage Link payload: deviceType, firmwareVersion, hardwareVersion, timestamp."
            - "Полные требования портала — portal_backend_status.md."
          example_storage_link:
            deviceType: storage_link
            firmwareVersion: "1.0.0"
            hardwareVersion: "1.0"
            timestamp: "2026-04-28T12:00:00Z"
          product_variants:
            iheater_link:
              notes:
                - "info.units[0].unitId публикуется как ЧИСЛО 0, а не строка 'U1'."
                - "Это противоречит rules.unit_id_format ('string U1..U4') — но Portal type для InfoPayload тоже numeric."
                - "Для info это исторически фиксированное расхождение."
              extra_fields:
                capabilities:
                  {
                    type: uint32,
                    note: "битовая маска UnitCaps; в iHeater-link реальный код пишет capabilities как nested-object под units[0] (HeaterProfile.cpp:67-73), потребитель должен принимать оба варианта",
                  }
                scales:
                  {
                    type: array,
                    note: "пустой массив, если нет весов; в iHeater лежит как пустой массив внутри units[0]",
                  }
                rfid:
                  {
                    type: array,
                    note: "пустой массив, если нет RFID; в iHeater лежит как пустой массив внутри units[0]",
                  }
                workTimeCounter: { type: uint32, unit: s }
                unitsCount: { type: uint8 }
                mcuSerial: { type: string, optional: true }
                deviceType: { type: string }
                timestamp: { type: ISO8601 }
              source_ref: "iHeater-link/src/heater/HeaterProfile.cpp:52-81"
      uart:
        kind: Hello
        kind_id: 0x01
        payload: Hello
        size_bytes: 86
        ack: true
        fragmented: false
        direction_uart: rp2040_to_esp
        source_ref: "uart_bridge.cpp:sendHello / uart_protocol.h:80"
    status: implemented

  - name: telemetry
    direction: device_to_backend
    purpose: "Периодическая телеметрия камер: температура, влажность, мощность нагревателя, состояние вентилятора."
    bindings:
      mqtt:
        suffix: telemetry
        full_topic: "idryer/{serial}/telemetry"
        producer: "MqttClient::publishTelemetry() / TelemetryPublisher::publishTelemetry()"
        consumer: "portal/backend (telemetry.handler.ts)"
        qos: 0
        retained: false
        interval: "product-defined; default 5000 ms (5 сек). Источники: idryer-core IDRYER_INTERVAL_TELEMETRY_MS=5000 (idryer_topics.h:45); iHeater-link kIntervalMs=5000 (telemetry.cpp:20)."
        payload:
          json_shape:
            "units[i].unitId": 'formatUnitId(entry.unitId) → "U1".."U4"'
            "units[i].temperature": "entry.temperatureC10 / 10.0"
            "units[i].humidity": "entry.humidityPct10 / 10.0"
            "units[i].heaterPower": "entry.heaterPowerPct"
            "units[i].fanStatus": "entry.fanOn == 1"
          example_climate:
            units:
              - { unitId: U1, temperature: 23.5, humidity: 47.2 }
          product_variants:
            iheater_link:
              extra_top_level_fields:
                deviceType: { type: string, source: "src/heater/telemetry.cpp" }
                active:
                  {
                    type: string,
                    note: "activeIntegrationToString(getActive())",
                  }
                outputMode:
                  {
                    type: int,
                    note: "static_cast<int>(out.mode); в коде поле — int, не string",
                  }
                targetTempC: { type: float, unit: "°C" }
                rssi: { type: int }
                uptime:
                  {
                    type: uint32,
                    unit: s,
                    note: "millis()/1000 — секунды, не миллисекунды",
                  }
              extra_unit_fields:
                "units[0].heaterPower":
                  { type: int, note: "0 или 100 (heating ? 100 : 0)" }
                "units[0].fanStatus":
                  { type: bool, note: "всегда false на iheater_link" }
              source_ref: "iHeater-link/src/heater/telemetry.cpp:66-83"
              notes:
                - "iHeater Link публикует эти поля сверх стандартной units[]-схемы."
                - "Они НЕ часть общего контракта — потребитель должен ожидать их только для deviceType=iheater_link."
      uart:
        kind: Telemetry
        kind_id: 0x10
        payload: Telemetry
        ack: true
        fragmented: false
        direction_uart: rp2040_to_esp
        ack_kind: TelemetryAck
        ack_kind_id: 0x11
        source_ref: "uart_protocol.h:82, uart_manager.h:sendUartTelemetry; iDryerRP2040/src/uart/uart_manager.cpp:267-284 (sendUartTelemetry → uartBridge.sendTelemetry(payload, true))"
    status: implemented

  - name: status
    direction: device_to_backend
    purpose: "Состояние юнитов: режим, целевые параметры, прогресс сессии, этапы профиля."
    bindings:
      mqtt:
        suffix: status
        full_topic: "idryer/{serial}/status"
        producer: "MqttClient::publishStatus() / TelemetryPublisher::publishStatus()"
        consumer: "portal/backend (status.handler.ts)"
        qos: 0
        retained: true
        interval: "on change"
        payload:
          json_shape:
            "uptime": "data.uptime"
            "rssi": "WiFi.RSSI() (dBm) — диагностический, optional"
            "units[i].unitId": "U1..U4"
            "units[i].mode": "IDLE | DRYING | STORAGE | PROFILE | FAULT | UNKNOWN"
            "units[i].sessionNum": "uint > 0 для активных режимов (DRYING/STORAGE/PROFILE); 0/omit для IDLE/FAULT. ОБЯЗАТЕЛЬНО для активных — backend status.handler.ts:69 пропускает status без sessionNum."
            "units[i].target.temperature": "°C (float)"
            "units[i].target.humidity": "%RH (если присутствует)"
            "units[i].target.duration": "minutes (соответствует Device.targetDurationMins)"
            "units[i].elapsedTime": "seconds — время текущего юнит-сегмента"
            "units[i].totalElapsed": "seconds — для PROFILE: с начала профиля"
            "units[i].totalRemaining": "seconds — для PROFILE: до конца профиля"
            "units[i].currentStage": "только PROFILE"
            "units[i].totalStages": "только PROFILE"
            "units[i].stageElapsed": "только PROFILE"
            "units[i].stageRemaining": "только PROFILE"
            "units[i].stagePhase": "RAMP | HOLD (только PROFILE)"
          source_ref:
            backend_validator: "iDryerPortal/backend/src/mqtt-telemetry/handlers/status.handler.ts:43-111 (handleUnitStatus + sessionNum gate)"
            backend_types: "iDryerPortal/backend/src/mqtt-telemetry/mqtt-api.types.ts:150-173 (StatusPayload)"
            facade_publisher: "lib/idryer-core/src/iDryer.cpp::Link::publishStatusNow (iDryer + iHeater Link)"
            legacy_dryer: "idryer-link/lib/idryer-protocol/src/cloud/telemetry_publisher.cpp::publishStatus"
          notes:
            - "Портал ожидает units[] обязательно."
            - "Унифицировано: Dryer и iHeater Link шлют status в одном shape (с 2026-05). Раньше iHeater Link использовал top-level outputMode/targetTempC в telemetry — теперь это deprecated, через status."
            - "ВАЖНО: backend status.handler.ts:69 — без sessionNum>0 status для DRYING/STORAGE/PROFILE дропается без broadcast. Active-mode без sessionNum = silent failure на портале."
      uart:
        kind: Status
        kind_id: 0x13
        payload: Status
        ack: false
        fragmented: false
        direction_uart: rp2040_to_esp
        source_ref: "uart_protocol.h:85"
    status: implemented

  - name: weights
    direction: device_to_backend
    purpose: "Веса (до 4 датчиков), для устройств с весами."
    bindings:
      mqtt:
        suffix: weights
        full_topic: "idryer/{serial}/weights"
        producer: "TelemetryPublisher::publishWeights() (idryer-link)"
        consumer: "portal/backend (weights.handler.ts)"
        qos: 0
        retained: false
        interval: "~10s, on change"
        payload:
          # Точный shape проверен по idryer-link/lib/idryer-protocol/src/cloud/telemetry_publisher.cpp:160-181
          json_shape:
            "weights[i].sensorId": '"W1".."W4" (formatSensorId)'
            "weights[i].value": "float, граммы (entry.weightGramsC10 / 10.0f)"
            "weights[i].unitId": '"U1".."U4" (formatUnitId)'
          example:
            weights:
              - { sensorId: W1, value: 12.4, unitId: U1 }
              - { sensorId: W2, value: 28.7, unitId: U1 }
          notes:
            - "Массив weights[] лежит на ВЕРХНЕМ уровне документа, НЕ внутри units[]."
            - "Поле value — float в граммах. В UART payload приходит как weightGramsC10 (uint16, граммы × 10) и делится на 10.0 при сериализации в JSON."
            - "Старый idryer-link публикует это; idryer-core (Storage Link) — нет."
      uart:
        kind: Weights
        kind_id: 0x12
        payload: Weights
        ack: false
        fragmented: false
        direction_uart: rp2040_to_esp
        source_ref: "uart_protocol.h:84, uart_manager.h:sendUartWeights"
    status: implemented_device_only
    notes:
      - "На стороне idryer-core MqttClient API нет publishWeights — только legacy idryer-link публикует weights."
      - "Портал слушает 'idryer/+/weights' и имеет weights.handler."

  - name: rfid_event
    direction: device_to_backend
    purpose: "Событие RFID-ридера (tag_detected / tag_removed)."
    bindings:
      mqtt:
        suffix: rfid
        full_topic: "idryer/{serial}/rfid"
        producer: "TelemetryPublisher::publishRfid() (idryer-link)"
        consumer: "portal/backend (rfid.handler.ts)"
        qos: 0
        retained: true
        interval: "on event"
        payload:
          # Имена событий проверены: firmware telemetry_publisher.cpp:407,409
          # Портал rfid.handler.ts:73,80 — слушает те же строки.
          json_shape:
            event: "'tag_detected' | 'tag_removed' (lowercase)"
            unitId: "U1..U4"
            readerId: "string (опционально)"
            tag: "hex-строка ID метки"
          example:
            unitId: U1
            event: tag_detected
            tag: "04A1B2C3D4E5F6"
          notes:
            - "Портал нормализует регистр: 'TAG_DETECTED' → 'tag_detected'. Прошивка должна слать lowercase."
      uart:
        kind: Rfid
        kind_id: 0x14
        payload: Rfid
        ack: false
        fragmented: false
        direction_uart: rp2040_to_esp
        source_ref: "uart_protocol.h:86, uart_manager.h:sendRfidEvent"
    status: implemented_device_only
    notes:
      - "MqttClient (idryer-core) не имеет publishRfid; реализуется в idryer-link."

  - name: rfid_read_data
    direction: device_to_backend
    purpose: "Прочитанный с метки блок данных (888B), фрагментированный."
    bindings:
      mqtt:
        suffix: rfid
        full_topic: "idryer/{serial}/rfid"
        producer: "TelemetryPublisher::publishRfidData() — idryer-link/.../telemetry_publisher.cpp:296-307"
        consumer: "portal/backend rfid-data.handler.ts (диспетчеризация: rfid.handler.ts:27 — `if (data.format) → rfid-data.handler`)"
        qos: 0
        retained: true
        payload:
          json_shape:
            readerId: "uint8 — физический индекс ридера на RP2040"
            unitId: "uint8 — логический индекс камеры (0..3)"
            tagId: "string — UID метки (HEX)"
            format: "string — кодировка блока ('ndef' / 'bambu' / 'raw'), наличие этого поля отличает rfid_read_data от rfid_event"
            data: "string — base64 данные блока"
          notes:
            - "Использует тот же топик что и rfid_event; различается по shape — здесь ОБЯЗАТЕЛЬНО присутствуют 'format' и 'data', у event их нет (event имеет 'event' = tag_detected/tag_removed)."
      uart:
        kind: RfidReadData
        kind_id: 0x1A
        payload: RfidData
        ack: true
        fragmented: true
        direction_uart: rp2040_to_esp
        flow_control: "stop-and-wait ACK на каждый фрагмент"
        source_ref: "uart_protocol.h:87"
    status: implemented_device_only

  - name: rfid_write_data
    direction: backend_to_device
    purpose: "Данные для записи на метку (888B), фрагментированный поток."
    bindings:
      mqtt:
        suffix: commands/write_rfid
        full_topic: "idryer/{serial}/commands/write_rfid"
        producer: "portal: rfid/write-orchestrator.service"
        consumer: "device (idryer-link, RfidWriteData transmission)"
        qos: 1
        retained: false
        payload:
          portal_publishes:
            commandId: { type: string, required: true }
            unitId: { type: string }
            expectedUid: { type: string, optional: true }
            ttlMs: { type: uint32, optional: true }
            format: { type: string }
            data: { type: string, encoding: "base64" }
            timestamp: { type: ISO8601 }
            source_ref: "iDryerPortal/backend/src/rfid/write-orchestrator.service.ts:211-234"
          legacy_firmware_expects:
            unitId: { type: string }
            data: { type: string, encoding: "base64" }
            verify:
              {
                type: string,
                note: "header32 etc — мапится в numeric verify mode",
              }
            source_ref: "idryer-link/lib/idryer-protocol/src/cloud/command_handler.cpp:415-512"
          notes:
            - "INTEROP-BREAK: Portal payload и legacy consumer несовместимы — см. known_mismatches.write_rfid_payload_mismatch."
            - "iHeater-link явно игнорирует commands/write_rfid (src/heater/command_routing.cpp:206-215)."
      uart:
        kind: RfidWriteData
        kind_id: 0x1B
        payload: RfidData
        ack: true
        fragmented: true
        direction_uart: esp_to_rp2040
        flow_control: "stop-and-wait ACK на каждый фрагмент"
        source_ref: "uart_protocol.h:88, uart_bridge.h:sendRfidWriteData"
        notes:
          - "MQTT-сторона — это commands/write_rfid; портал также подписан на idryer/+/rfid/write_result для подтверждения."
    status: design_or_partial
    notes:
      - "См. known_mismatches.write_rfid_payload_mismatch — Portal и legacy device firmware шлют/ждут разные shape."

  - name: config_full
    direction: device_to_backend
    purpose: "Полный JSON-конфиг меню в ответ на запрос get_config / device.getConfig."
    bindings:
      mqtt:
        suffix: config
        full_topic: "idryer/{serial}/config"
        producer: "MqttClient::publishConfig() / publishConfigRaw() (chunked > 16 KB)"
        consumer: "portal/backend (config.handler.ts)"
        qos: 0
        retained: false
        interval: "on request (commands/get_config или invoke device.getConfig)"
        payload:
          shape_full:
            v: "uint — revision номер меню (incrementing). REQUIRED — портал валидирует наличие в config.handler.ts:41."
            menu: "object — продукт-специфичная структура меню (например, MenuBridge::publishFullConfig). Источник: menu_commands.cpp:254 в iHeater-link."
            note: "Полный (нечанкованный) payload использует 'v', НЕ 'rev'. Поле 'rev' существует только в config_delta. Не путать!"
          shape_chunked:
            tid: "uint — transferId, общий для всех чанков одного transfer'а"
            idx: "uint — индекс текущего чанка (0..total-1)"
            total: "uint — всего чанков"
            last: "bool — флаг последнего чанка"
            d: "string/object — payload фрагмент (base64 либо часть JSON)"
            note: "Chunked используется когда полный JSON > MQTT_CONFIG_CHUNK_SIZE (16000 B). publishConfigRaw собирает чанки автоматически."
          notes:
            - "Schema продукт-зависимая (например, MenuBridge::publishFullConfig в iHeater-link)."
            - "publishConfigRaw поддерживает chunked transmission > MQTT_CONFIG_CHUNK_SIZE (16000 B)."
            - "Portal config.handler.ts:38-43 распознаёт обе формы: chunked (по наличию 'tid') vs full (по наличию 'v' и 'menu')."
      uart:
        kind: ConfigPush
        kind_id: 0x30
        payload: ConfigChunk
        ack: true
        fragmented: true
        direction_uart: bidirectional
        source_ref: "uart_protocol.h:91 (ConfigPush=0x30), uart_bridge.h:sendConfigPushChunk"
        notes:
          - "Используется и для commands/set, и для commands/invoke (передача JSON c MCU и обратно)."
    status: implemented

  - name: config_delta
    direction: device_to_backend
    purpose: "Частичное обновление конфига без полной пересылки."
    bindings:
      mqtt:
        suffix: config/delta
        full_topic: "idryer/{serial}/config/delta"
        producer: "MqttClient::publishConfigDelta()"
        consumer: "portal/backend (config-delta.handler.ts)"
        qos: 0
        retained: false
        interval: "on change"
        payload:
          required_fields: [d]
          notes:
            - "Портал ждёт поле 'd' (объект-патч)."
            - "Поле 'rev' — обязательно по требованию портала; продукт включает его сам."
          example:
            rev: 5
            d: { "3": [55, 60, 55] }
      uart:
        kind: ConfigPush
        kind_id: 0x30
        payload: ConfigChunk
        ack: true
        fragmented: true
        direction_uart: bidirectional
        source_ref: "uart_manager.h:sendConfigDelta"
        notes:
          - "На UART delta едет тем же ConfigPush kind; различение — по shape JSON внутри."
    status: implemented

  - name: command_drying
