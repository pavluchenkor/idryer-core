              {
                type: number,
                optional: true,
                note: "0..3 — для per-unit полей; для global — отсутствует",
              }
            val: { type: any, required: true, note: "новое значение поля" }
            timestamp:
              {
                type: string,
                format: ISO8601,
                note: "поле есть в payload, но handler НЕ читает",
              }
            example:
              {
                cmd: "set",
                id: 3,
                unit: 0,
                val: 55,
                timestamp: "2026-04-28T12:00:00Z",
              }
          # Альтернативная форма (используется ТОЛЬКО device-internal в iHeater-link self-loopback):
          device_internal_only:
            example: { bind: "moon_en", val: true }
            note: "Эту форму генерирует iHeater-link сам себе в command_routing.cpp:188-191 (sync toggle меню после link_integration enabled). Portal эту форму НЕ публикует. Bridge handleSet (command_handler.cpp:305-339) поле 'bind' игнорирует — bind-форма не уходит в RP2040."
          notes:
            - "iHeater-link/MenuBridge::applySetCommand принимает обе формы (id или bind), но portal шлёт только id-форму."
            - "Поле 'timestamp' игнорируется handler'ом (legacy bridge), но портал его всегда добавляет."
      uart:
        kind: ConfigPush
        kind_id: 0x30
        payload: ConfigChunk
        ack: true
        direction_uart: esp_to_rp2040
        source_ref: "command_handler.cpp:set/invoke fragmented"
        notes:
          - "Для legacy dryer передаётся через ConfigPush JSON, не через CommandPayload."
