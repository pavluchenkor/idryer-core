    - "lib/idryer-core/src/uart/uart_bridge.h"
    - "lib/idryer-core/src/uart/uart_bridge.cpp"
    - "lib/idryer-core/src/runtime/idryer_runtime.cpp"
    - "lib/idryer-core/src/cloud/action_dispatcher.h"
    - "lib/idryer-core/src/integrations/common/link_integrations_manager.h"
    - "lib/idryer-core/src/integrations/common/link_integrations_types.h"
    # iHeater-link (текущий ESP32-bridge для iHeater)
    - "iHeater-link/src/heater/command_routing.cpp"
    - "iHeater-link/src/heater/MenuBridge.cpp"
    - "iHeater-link/src/heater/telemetry.cpp"
    - "iHeater-link/src/heater/HeaterProfile.cpp"
    # idryer-link (legacy ESP32-bridge для Storage / Dryer; используется на проде)
    - "idryer-link/src/IdryerDevice.cpp"
    - "idryer-link/lib/idryer-protocol/src/cloud/telemetry_publisher.cpp"
    - "idryer-link/lib/idryer-protocol/src/cloud/command_handler.cpp"
    - "idryer-link/lib/idryer-protocol/src/cloud/link_integrations_manager.cpp"
    - "idryer-link/lib/idryer-protocol/src/uart/uart_protocol.h"
    - "idryer-link/lib/idryer-protocol/src/mqtt/idryer_topics.h"
    # iDryerRP2040 (контроллер; UART-сторона)
