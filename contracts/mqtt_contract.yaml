# ─────────────────────────────────────────────────────────────────────────────
# 2. INVOKE-ACTIONS (универсальный конверт commands/invoke)
# ─────────────────────────────────────────────────────────────────────────────
#
# Архитектура:
#   ActionDispatcher::handleInvoke (action_dispatcher.cpp:9-21) читает поле
#   "action" из payload и вызывает зарегистрированный продуктом колбэк
#   invokeHandler_. Если продукт не вызывал setInvokeHandler — все action'ы
#   логируются как "unhandled".
#
#   Поверх этого IdryerRuntime::onCommand (idryer_runtime.cpp) перехватывает
#   commandHandler_-колбэк (если зарегистрирован через setCommandHandler) ДО
#   ActionDispatcher и сам решает, как разруливать commands/invoke.
#
# Поэтому реальный список "что принимается" разный у каждого продукта:
#   - core: единственный встроенный action — device.getConfig (через
#           default-ветку IdryerRuntime, когда commandHandler_ не задан).
#   - iheater_link: команда "invoke" ЯВНО ИГНОРИРУЕТСЯ в command_routing.cpp.
#                   Никаких action'ов не принимается.
#   - idryer_link:  принимает {cmd:"invoke", id:<int>} и проксирует в RP2040
#                   через ConfigPush; диспетчинг по action-name НЕ реализован.
#   - rp2040:       на UART через ConfigPush принимает {cmd:"invoke", id} и
#                   вызывает MenuItem.action.invoke() для item с type=MN_ACTION.
#                   Доступные действия = on_invoke в menu_v2.yaml.
# ─────────────────────────────────────────────────────────────────────────────
invoke_actions:
  # ── Встроенные в SDK (доступны всем продуктам, если они НЕ перехватывают
  #    command через setCommandHandler) ──────────────────────────────────────
  core:
    - name: device.getConfig
      direction: backend_to_device
      purpose: "Унифицированный аналог commands/get_config через invoke."
      args: {}
      reply:
        mode: publish
        topic: "idryer/{serial}/config"
        schema:
          notes: "Публикация MqttClient::publishConfig() с результатом IProfile::getConfig(doc)."
      bindings:
        mqtt:
          topic_suffix: commands/invoke
          qos: 1
          payload:
            example:
              action: device.getConfig
              args: {}
        uart:
          applicable: false
          notes:
            - "Обрабатывается локально в ESP32 (IdryerRuntime), UART не задействован."
      status: implemented
      source_ref: "lib/idryer-core/src/runtime/idryer_runtime.cpp:87 (handleInvoke 'device.getConfig')"
      notes:
        - "Перехватывается ДО ActionDispatcher: работает только если продукт НЕ зарегистрировал свой commandHandler через setCommandHandler."
        - "Портал в продакшене этот action не использует — он шлёт commands/get_config напрямую (devices.service.ts:1269). Действие фактически dead-code, но в SDK сохранено."

    # led.pulse переехал в invoke_actions.storage_link (см. ниже).
    # SDK сам этот action не обрабатывает — реализация и контракт у продукта.

  # ── storage_link (ESP32-only, LED strip + опц. SHT31) ──────────────────
  storage_link:
    - name: led.pulse
      direction: backend_to_device
      purpose: |
        Универсальная команда управления LED-лентой Storage Link.
        Два режима, выбираются по наличию ledIndex:

          1) ZONE PULSE — есть ledIndex → подсветить отрезок ленты
             (один слот = ledIndex .. ledIndex+ledCount-1) одним цветом
             на durationSec секунд. Маппинг slot → LED-индексы делает
             портал (он знает топологию шкафа: ряды, змейка, leds_per_slot);
             ESP не знает про слоты, только про LED-индексы.

          2) GLOBAL ANIMATION OVERRIDE — нет ledIndex, есть animation →
             запустить указанную анимацию на ВСЕЙ ленте с указанным цветом.
             По смыслу — то же что юзер-меню (idle_enabled + anim_* +
             idle_*color), но через invoke и с произвольным RGB цветом
             (не из 8-цветной палитры меню).

             Override живёт в RAM устройства, НЕ persist'ится в NVS:
               • reboot ESP                 → возврат к menu-defaults;
               • любой commands/set по меню → override снимается.
             "animation": "off" — снять override (вернуться к menu-state).
      args:
        # ── Mode 1: ZONE PULSE ──────────────────────────────────────
        ledIndex:
          type: int
          required: false
          range: [0, 299]
          notes: "Стартовый LED. Если присутствует — режим ZONE PULSE."
        ledCount:
          type: int
          required: false
          default: 1
          range: [1, 300]
          notes: |
            Количество подряд идущих LED, начиная с ledIndex.
            Default 1 → backward compat с прошлым «1 слот = 1 LED».

        # ── Mode 2: GLOBAL ANIMATION OVERRIDE ───────────────────────
        animation:
          type: enum
          values: ["solid", "breathe", "wave", "rainbow", "twinkle", "off"]
          required: false
          default: "solid"
          notes: |
            Применяется к ZONE PULSE — нет (всегда solid в зоне).
            Применяется к GLOBAL OVERRIDE — обязательно.
            Описание:
              solid    — постоянный свет (требует color)
              breathe  — мягкое дыхание яркости (~2 сек период), color
              wave     — бегущая волна по ленте, color
              rainbow  — HSV-проход по ленте, color ИГНОРИРУЕТСЯ
              twinkle  — случайные «звёзды» (мягкий уют), color (база)
              off      — выключить активный override / pulse-зону

        # ── Общие ───────────────────────────────────────────────────
        color:
          type: string
          encoding: "#RRGGBB"
          required: false
          default: "ZONE: из menu.pulse_color (8-цветная палитра); GLOBAL: white"
          notes: |
            ZONE: если опущен — берётся из меню (toggle group pulse_*).
            GLOBAL: используется напрямую, любой #RRGGBB
                    (не маппится в палитру меню).
        durationSec:
          type: int
          required: false
          default: "ZONE: из menu.pulse_dur_sec; GLOBAL: 0 (бесконечно)"
          range: [0, 600]
          notes: |
            ZONE: 0 — выключить активную зону немедленно.
            GLOBAL: игнорируется — override бесконечный, выкл через "animation":"off".

      bindings:
        mqtt:
          topic_suffix: commands/invoke
          qos: 1
          payload:
            examples:
              zone_pulse_basic:
                action: led.pulse
                args:
                  ledIndex: 14
                  ledCount: 3
                  color: "#00FF00"
                  durationSec: 30
              zone_pulse_off:
                action: led.pulse
                args: { ledIndex: 14, ledCount: 3, durationSec: 0 }
              global_anim_wave:
                action: led.pulse
                args: { animation: "wave", color: "#0033FF" }
              global_anim_twinkle:
                action: led.pulse
                args: { animation: "twinkle", color: "#FFD700" }
              global_anim_off:
                action: led.pulse
                args: { animation: "off" }
        uart:
          applicable: false
      status: implemented
      source_ref: "src/storage/led_strip/led_strip_executor.cpp::handlePulse + src/storage/led_strip/led_strip_animations.cpp::animationsOverride"
      notes:
        - "ledCount default 1 — обратная совместимость с одиночным LED."
        - "rainbow внутри ZONE pulse не имеет смысла (зона коротка) — для зоны всегда solid."
        - "Если payload содержит и ledIndex и animation — приоритет ZONE PULSE, animation игнорируется."
        - "Bulk-вариант (массив zones[]) сознательно не введён: 30 одиночных команд на типичный шкаф укладываются в ~200 мс, нагрузка на брокер пренебрежимая."

  # ── iHeater-link (ESP32-only, без UART-MCU) ─────────────────────────────
  iheater_link:
    - name: "*"
      direction: backend_to_device
      purpose: "iHeater-link явно отбрасывает команду 'invoke' целиком."
      args: { notes: "Любые args игнорируются." }
      bindings:
        mqtt:
          topic_suffix: commands/invoke
          qos: 1
        uart:
          applicable: false
      status: explicitly_rejected
      source_ref: "src/heater/command_routing.cpp:206-216 (handleCommand: ветка 'unsupported')"
      notes:
        - "command_routing.cpp:212 явно перечисляет 'invoke' среди команд, для которых пишется лог 'unsupported on iHeater Link, ignored' и происходит return."
        - "На iHeater-link нет RP2040, поэтому проксирование action в menu по id не имеет смысла."
        - "Все управляющие операции (нагрев/остановка) идут как top-level commands: drying, stop, set, get_config, link_integration, bambu_apply (см. секцию messages выше)."

  # ── idryer-link (legacy Storage Link, ESP32 + RP2040 по UART) ──────────
  idryer_link:
    - name: "<by_id>"
      direction: backend_to_device
      purpose: "Вызов action из MCU-меню по числовому id; ESP32 проксирует в RP2040 через ConfigPush."
      args:
        id:
          {
            type: int,
            required: true,
            notes: "Индекс MenuItem в g_menu (RP2040), для которого type=MN_ACTION.",
          }
        action:
          {
            type: string,
            required: false,
            notes: "Поле принимается порталом в DTO, но в idryer-link/RP2040 не парсится — фактически no-op.",
          }
        timestamp:
          {
            type: string,
            encoding: "ISO 8601",
            required: false,
            notes: "Используется для NTP-синхронизации ESP32.",
          }
      reply:
        mode: none
        notes: "Подтверждение приходит на UART как ConfigAck (0x31) от RP2040; в MQTT эхо не публикуется."
      bindings:
        mqtt:
          topic_suffix: commands/invoke
          qos: 1
          payload:
            example:
              cmd: invoke
              id: 5
              timestamp: "2026-04-30T12:00:00Z"
        uart:
          kind: ConfigPush
          kind_id: 0x30
          payload: 'JSON {"cmd":"invoke","id":<id>} (max 64 байт)'
          ack: true
          direction_uart: esp_to_rp2040
      status: implemented
      source_ref: "idryer-link/lib/idryer-protocol/src/cloud/command_handler.cpp:341-367 (CommandHandler::handleInvoke)"
      notes:
        - "Это id-based-механизм, а не action-name. ESP32 не имеет реестра имён."
        - "Список доступных id определяется menu_v2.yaml на RP2040 (см. секцию rp2040 ниже)."
        - "Если поле 'id' не int — handler пишет WARN и выходит."

  # ── RP2040 (MCU; принимает invoke по UART через ConfigPush, не MQTT) ───
  # source_ref для всей секции:
  #   dispatch:        iDryerRP2040/src/uart/uart_manager.cpp:1011-1039
  #   compiled_table:  iDryerRP2040/src/menu/menu_data.cpp
  #   callback_bodies: iDryerRP2040/src/menu/user_menu_callbacks.cpp
  #   declarative:     iDryerRP2040/src/menu/menu_v2.yaml (manifest)
  # У каждого name ниже — только declarative_line (строка в menu_v2.yaml).
  rp2040:
    # Транспортная обёртка: на RP2040 invoke приходит из ESP32 через UART
    # ConfigPush (kind=0x30) в виде JSON {"cmd":"invoke","id":<menu_id>}.
    # Маршрутизация: uart_manager.cpp:1011-1039 -> g_menu[id].u.action.invoke().
    # Список ниже — реальные имена C-функций (on_invoke) в menu_v2.yaml,
    # на которые ссылается item.u.action.invoke. Поле "id" — индекс
    # MenuItem; конкретные id вычисляются генератором gen_menu_v2.py и
    # привязки id↔имя нужно смотреть в сгенерированном menu_v2.cpp.

    - name: "<section_source_ref>"
      direction: esp_to_rp2040
      purpose: "Section-level source_ref для всех rp2040 invoke actions ниже."
      status: notes_only
      source_ref:
        dispatch: "iDryerRP2040/src/uart/uart_manager.cpp:1011-1039"
        compiled_table: "iDryerRP2040/src/menu/menu_data.cpp"
        callback_bodies: "iDryerRP2040/src/menu/user_menu_callbacks.cpp"
        declarative: "iDryerRP2040/src/menu/menu_v2.yaml (manifest)"
      notes:
        - "У каждого name ниже — только declarative_line: индекс name в menu_v2.yaml как декларация. Реальный исполняемый код см. в полях выше."

    - name: start_drying
      purpose: "Запустить ручной режим сушки на текущем активном юните (значения dry_temp / dry_time из меню)."
      bindings:
        uart:
          kind: ConfigPush
          kind_id: 0x30
          payload: 'JSON {"cmd":"invoke","id":<menu_id>}'
          direction_uart: esp_to_rp2040
          ack: true
      status: implemented
      declarative_line: "iDryerRP2040/src/menu/menu_v2.yaml:82 (on_invoke: start_drying)"

    - name: start_storage
      purpose: "Запустить режим хранения (storage) — поддержание низкой температуры с инверсной логикой."
      status: implemented
      declarative_line: "iDryerRP2040/src/menu/menu_v2.yaml:125 (on_invoke: start_storage)"

    - name: start_profile
      purpose: "Запустить выбранный профиль (через выбор в подменю profile)."
      status: implemented
      declarative_line: "iDryerRP2040/src/menu/menu_v2.yaml:152 (on_invoke: start_profile)"

    - name: start_drying_pla
      purpose: "Пресет: PLA."
      status: implemented
      declarative_line: "iDryerRP2040/src/menu/menu_v2.yaml:599"

    - name: start_drying_pla_cf
      purpose: "Пресет: PLA-CF."
      status: implemented
      declarative_line: "iDryerRP2040/src/menu/menu_v2.yaml:630"

    - name: start_drying_pla_gf
      purpose: "Пресет: PLA-GF."
      status: implemented
      declarative_line: "iDryerRP2040/src/menu/menu_v2.yaml:661"

    - name: start_drying_petg
      purpose: "Пресет: PETG."
      status: implemented
      declarative_line: "iDryerRP2040/src/menu/menu_v2.yaml:692"

    - name: start_drying_petg_cf
      purpose: "Пресет: PETG-CF."
      status: implemented
      declarative_line: "iDryerRP2040/src/menu/menu_v2.yaml:723"

    - name: start_drying_petg_gf
      purpose: "Пресет: PETG-GF."
      status: implemented
      declarative_line: "iDryerRP2040/src/menu/menu_v2.yaml:754"

    - name: start_drying_abs
      purpose: "Пресет: ABS."
      status: implemented
      declarative_line: "iDryerRP2040/src/menu/menu_v2.yaml:785"

    - name: start_drying_abs_cf
      purpose: "Пресет: ABS-CF."
      status: implemented
