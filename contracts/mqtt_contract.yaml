    portal_reader: "iDryerPortal/backend/src/rfid/write-orchestrator.service.ts:288-295 — lookup по тому же составному ключу"
    decision_made: "yaml: в rfid/write_result.json_shape пометить unitId — STRICTLY string 'U1..U4' (не numeric)."
    status: implemented
    found_by: "external audit (RFID-011)"
    todo:
      - "Уточнить json_shape в mqtt_only[rfid/write_result] — unitId только string."

  - id: count_fields_upper_bounds_missing
    severity: high
    summary: "Поля count в payloads.Hello.unitsCount, .Telemetry.count, .Status.count, .Weights.count в yaml без upper bounds, реальный wire array — [4]. Это позволяет недостоверным consumer-loop циклам."
    spa_hello_07: "Hello.unitsCount: yaml uint8 без range; wire — units[4]; current RP2040 product subset MENU_MAX_UNITS=3"
    spa_weights_01: "Weights.count: yaml uint8 без range; wire — weights[4]; producer clamp i<4"
    spa_telem_02: "Telemetry.count: yaml имеет range 0..4 — match"
    spa_status_02: "Status.count: yaml имеет range 0..4 — match"
    decision_made: "Добавить explicit range 0..4 для unitsCount и Weights.count."
    status: implemented
    found_by: "external audit (SPA-HELLO-07, SPA-WEIGHTS-01)"
    todo:
      - "yaml: добавить range '0..4' к payloads.Hello.fields.unitsCount и payloads.Weights.fields.count."

  - id: ha_publisher_loop_bound_bugs
    severity: high
    summary: "Shared HA consumer (ha_publisher.cpp) использует неправильные upper bounds в loop'ах: Telemetry/Status truncate to 3 (i<3), Weights использует i<8 для weights[4] — потенциальный read past array."
    code_evidence:
      telemetry: "lib/idryer-core/src/integrations/home_assistant/ha_publisher.cpp:298-315 — loop `i < data.count && i < 3`"
      status: "lib/idryer-core/src/integrations/home_assistant/ha_publisher.cpp:331-337 — loop `i < data.count && i < 3`"
      weights: "lib/idryer-core/src/integrations/home_assistant/ha_publisher.cpp:353-359 — loop `i < data.count && i < 8` (НО weights[4]!)"
    impact: "Telemetry/Status: 4-й юнит не публикуется в HA. Weights: при некорректном count>4 чтение за пределами массива (UB)."
    decision_required: |
      1) Поправить ha_publisher.cpp loops: i<4 везде (либо использовать NUM_UNITS константу).
    status: design_or_partial
    interop_break: false
    found_by: "external audit (SPA-TELEM-03, SPA-STATUS-03, SPA-WEIGHTS-02)"
    todo:
      - "Code-fix: lib/idryer-core/src/integrations/home_assistant/ha_publisher.cpp:298,331,353 — заменить magic 3/8 на 4 или NUM_UNITS."

  - id: rfid_event_readerId_note_wrong_path
    severity: medium
    summary: "yaml payloads.Rfid.fields.readerId.note описывает поведение '0xFF resolution by unitId', но это поведение для ВХОДЯЩЕГО RfidWriteData write fragment (RP2040 main.cpp:1061-1069), НЕ для исходящего Rfid (0x14) event."
    rfid_event_path: "RP2040 main.cpp:2022-2031, 2063-2067 — sender всегда заполняет readerId конкретным числом"
    rfid_write_data_path: "RP2040 main.cpp:1061-1069 — для входящего write-fragment LINK может слать 0xFF, RP2040 резолвит по unitId"
    decision_made: "yaml: переместить '0xFF resolution' note из payloads.Rfid.fields.readerId в payloads.RfidData.fields.readerId — там это уместно."
    status: implemented
    found_by: "external audit (SPA-RFID-02)"
    todo:
      - "yaml: payloads.Rfid.fields.readerId — убрать '0xFF resolution' note, оставить только 'physical reader index'."
      - "yaml: payloads.RfidData.fields.readerId — добавить note про '0xFF=auto-resolve by unitId' для incoming write-fragments."

  - id: config_legacy_binary_broken
    severity: high
    summary: "yaml payloads.Config описывает legacy binary UartConfigPayload (8 bytes), но RP2040 handleUartConfig не парсит его как struct — копирует байты в chunkPayload.data и runs deserializeJson на бинарных байтах."
    code_evidence:
      yaml_decl: "payloads.Config: targetTemperatureC10/targetHumidityPct/durationMinutes/fanDutyPct (8 bytes binary struct из uart_protocol.h:241-245)"
      rp2040_handler: "iDryerRP2040/src/uart/uart_manager.cpp:907-915,921-927 — handleUartConfig копирует payload в chunkPayload.data и зовёт deserializeJson(); binary НЕ парсится корректно"
    impact: "Legacy binary ConfigPush никогда не сработает на current RP2040 firmware."
    decision_required: |
      1) Снять path с binary ConfigPush (статус 'legacy/broken') в yaml;
      2) ИЛИ: исправить handleUartConfig чтобы реально парсил binary struct.
    status: design_or_partial
    interop_break: true
    found_by: "external audit (BLK-CONFIG-LEGACY)"
    todo:
      - "yaml: payloads.Config — пометить как legacy_broken; не использовать как канон."

  - id: log_payload_struct_not_string
    severity: high
    summary: "yaml payloads.Log описывает 'raw bytes (UART_MAX_PAYLOAD)' — свободно-формальные строки. Реальный producer на RP2040 шлёт fixed-size binary DryerUart::LogPayload struct с полями severity/source/event/message."
    code_evidence:
      legacy_struct: "idryer-link/lib/idryer-protocol/src/uart/uart_protocol.h:301-309 (DryerUart::LogPayload) — fixed binary struct"
      rp2040_producer: "iDryerRP2040/src/main.cpp:1338-1354 + src/uart/uart_manager.cpp:1085-1093 — заполняет binary struct"
    decision_made: "yaml: payloads.Log должен описывать binary struct (severity[N], source[M], event[K], message[L], unitId), не 'raw bytes'."
    status: implemented
    found_by: "external audit (BLK-LOG-STRUCT)"
    todo:
      - "yaml: payloads.Log — заменить 'raw bytes' на binary struct DryerUart::LogPayload."

  - id: claimstatus_expiresAt_no_producer
    severity: high
    summary: "yaml payloads.ClaimStatus.fields.expiresAt описывает absolute uint32 unix epoch, но в current code-paths нет producer'а который реально его заполняет. Cloud claim callback экспонирует только pin + remainingSeconds; reference UART forwarder тоже шлёт status/pin/remainingSeconds, expiresAt=0."
    code_evidence:
      cloud_callback: "lib/idryer-core/src/cloud/cloud_state_machine.cpp:209-226 + http_api.cpp:95-102"
      reference_forwarder: "reference/dryer/DryerDevice.cpp:84-90"
    decision_made: "yaml: payloads.ClaimStatus.fields.expiresAt — пометить optional + note 'currently always 0; producer не доказан'."
    status: implemented
    found_by: "external audit (BLK-CLAIMSTATUS-EXPIRESAT)"
    todo:
      - "yaml: ClaimStatus.expiresAt — optional + note про отсутствие producer'а."

# ─────────────────────────────────────────────────────────────────────────────
# 7. TODO — что не удалось верифицировать автоматически
# ─────────────────────────────────────────────────────────────────────────────
todo:
  - "Расширить invoke_actions по продуктам (iHeater-link, idryer-link, RP2040) — собрать что каждый реально обрабатывает в своём CommandHandler."

# ─────────────────────────────────────────────────────────────────────────────
# 8. HA-PUBLISHER топики (publishing к локальному HA-broker)
# ─────────────────────────────────────────────────────────────────────────────
# Эти топики публикуются устройством В НАМЕСПЕЙСЕ idryer/{serial}/...,
# но направлены на ЛОКАЛЬНЫЙ HA MQTT-broker (не на портал).
# Не должны интерферировать с topic-namespace портала.
ha_integration_topics:
  topics:
    - pattern: "idryer/{serial}/alerts"
      direction: device_to_ha_broker
      source_ref: "lib/idryer-core/src/integrations/home_assistant/ha_publisher.cpp:544 (publishAlert) — реальный publish; :214 — discovery state_topic (не сам publish)"
      note: "Алерты для HA dashboard."
    - pattern: "idryer/{serial}/{unit}/{sensorName}"
      direction: device_to_ha_broker
      source_ref: "ha_publisher.cpp:65"
      note: "Per-sensor значения (temperature/humidity и т.п.)."
    - pattern: "idryer/{serial}/{unit}/set_mode"
      direction: bidirectional
      source_ref: "ha_publisher.cpp:381 (publish state), :452 (subscribe set)"
    - pattern: "idryer/{serial}/{unit}/{cmdSuffix}"
      direction: ha_to_device
      suffixes: ["set_temp", "set_duration"]
      source_ref: "ha_publisher.cpp:418, :455, :458"
    - pattern: "idryer/{serial}/{unit}/target_temp"
      direction: device_to_ha_broker
      source_ref: "ha_publisher.cpp:495"
    - pattern: "idryer/{serial}/{unit}/target_duration"
      direction: device_to_ha_broker
      source_ref: "ha_publisher.cpp:509"
  notes:
    - "Эти топики НЕ для портала. Для портала используется `mqtt_only[suffix=integrations/status]`."
    - "Направление: устройство ↔ локальный HA-broker (адрес из HaConfig)."
    - |
      HA broker discovery: если HaConfig.host пустой/невалидный — выполняется fallback
      `MDNS.queryService("home-assistant","tcp")` (ha_mqtt_client.cpp:54,69 в новой SDK;
      :72,89 в legacy). Берётся первый IP/port из ответа mDNS.
      TXT-записи mDNS-ответа НЕ парсятся, только IP+port.
    - |
      ⚠️ NAMESPACE COLLISION RISK: префикс `idryer/{serial}/*` совпадает с топиками портала.
      Разделение обеспечивается ТОЛЬКО разными broker-endpoint'ами (HaConfig.host vs portal MQTT host).
      Если по ошибке указать ОДИН и тот же broker для портала и HA — топики смешиваются:
      портал увидит alerts/per-sensor топики (которые ему не предназначены), HA-dashboard увидит
      portal-команды (commands/start и т.п.). Перед prod-деплоем убедиться что host'ы разные.

# ─────────────────────────────────────────────────────────────────────────────
# 9. HA-DISCOVERY топики (Home Assistant MQTT Discovery)
# ─────────────────────────────────────────────────────────────────────────────
# Публикуются устройством в namespace `homeassistant/...` для авто-регистрации
# entities в Home Assistant. Broker — тот же, что и у ha_integration_topics
# (HaConfig.host, не портал). Все retained=true (HA читает retained при старте).
# Подписки/команды от HA приходят в namespace idryer/... (см. ha_integration_topics).
ha_discovery_topics:
  namespace: "homeassistant"
  broker: "HaConfig.host (локальный, НЕ портал)"
  retained: true
  qos: 0
  identifiers:
    device_uid: "idryer_{serial}"
    entity_uid: "idryer_{serial}_{unitStr}_{name}"
    unit_format: "{unitStr} = U1|U2|U3"
  device_block:
    description: "Общий device-блок присутствует во всех discovery payload."
    fields:
      identifiers: ["idryer_{serial}"]
      name: "iDryer {serial}"
      model: "{hwVersion}"
      manufacturer: "iDryer"
      sw_version: "{fwVersion}"
  topics:
    - kind: sensor
      pattern: "homeassistant/sensor/idryer_{serial}_{unitStr}_{name}/config"
      source_ref: "lib/idryer-core/src/integrations/home_assistant/ha_publisher.cpp:72 (makeConfigTopic), :119-144 (payload)"
      entities:
        - {
            name: "temperature",
            unit: "°C",
            device_class: "temperature",
            icon: "mdi:thermometer",
            state_topic: "idryer/{serial}/{unitStr}/temperature",
          }
        - {
            name: "humidity",
            unit: "%",
            device_class: "humidity",
            icon: "mdi:water-percent",
            state_topic: "idryer/{serial}/{unitStr}/humidity",
          }
        - {
            name: "heater_power",
            unit: "%",
            device_class: null,
            icon: "mdi:radiator",
            state_topic: "idryer/{serial}/{unitStr}/heater_power",
          }
        - {
            name: "mode",
            unit: null,
            device_class: null,
            icon: "mdi:state-machine",
            state_topic: "idryer/{serial}/{unitStr}/mode",
          }
        - {
            name: "weight",
            unit: "g",
            device_class: "weight",
            icon: "mdi:weight-gram",
            state_topic: "idryer/{serial}/{unitStr}/weight",
          }
      payload_shape:
        name: "iDryer {unitStr} {entityName}"
        unique_id: "idryer_{serial}_{unitStr}_{entityName}"
        state_topic: "idryer/{serial}/{unitStr}/{entityName}"
        device_class: "{see entities[].device_class}"
        unit_of_measurement: "{see entities[].unit}"
        icon: "{see entities[].icon}"
        device: "{see device_block}"

    - kind: binary_sensor
      pattern: "homeassistant/binary_sensor/idryer_{serial}_{unitStr}_{name}/config"
      source_ref: "ha_publisher.cpp:163, :179-200 (payload)"
      entities:
        - {
            name: "fan",
            payload_on: "ON",
            payload_off: "OFF",
            state_topic: "idryer/{serial}/{unitStr}/fan",
          }
      payload_shape:
        name: "iDryer {unitStr} fan"
        unique_id: "idryer_{serial}_{unitStr}_fan"
        state_topic: "idryer/{serial}/{unitStr}/fan"
        payload_on: "ON"
        payload_off: "OFF"
        device: "{see device_block}"

    - kind: sensor_alerts
      pattern: "homeassistant/sensor/idryer_{serial}_alerts/config"
      source_ref: "ha_publisher.cpp:210-211"
      note: "Один общий alerts-sensor на устройство (не per-unit)."
      payload_shape:
        name: "iDryer {serial} alerts"
        unique_id: "idryer_{serial}_alerts"
        state_topic: "idryer/{serial}/alerts"
        device: "{see device_block}"

    - kind: select
      pattern: "homeassistant/select/idryer_{serial}_{unitStr}_mode_control/config"
      source_ref: "ha_publisher.cpp:374-375, :389-400 (payload)"
      entities:
        - { name: "mode_control", options: ["IDLE", "DRYING", "STORAGE"] }
      payload_shape:
        name: "iDryer {unitStr} mode"
        unique_id: "idryer_{serial}_{unitStr}_mode_control"
        state_topic: "idryer/{serial}/{unitStr}/mode"
        command_topic: "idryer/{serial}/{unitStr}/set_mode"
        options: ["IDLE", "DRYING", "STORAGE"]
        device: "{see device_block}"

    - kind: number
      pattern: "homeassistant/number/idryer_{serial}_{unitStr}_{cmdSuffix}/config"
      source_ref: "ha_publisher.cpp:414-415, :429-442 (payload)"
      entities:
        - {
            name: "set_temp",
            unit: "°C",
            min: 0,
            max: 90,
            step: 1,
            state_topic: "idryer/{serial}/{unitStr}/target_temp",
            command_topic: "idryer/{serial}/{unitStr}/set_temp",
          }
        - {
            name: "set_duration",
            unit: "s",
            min: 0,
            max: 86400,
            step: 60,
            state_topic: "idryer/{serial}/{unitStr}/target_duration",
            command_topic: "idryer/{serial}/{unitStr}/set_duration",
          }
      payload_shape:
        name: "iDryer {unitStr} {entityName}"
        unique_id: "idryer_{serial}_{unitStr}_{entityName}"
        state_topic: "{see entities[].state_topic}"
        command_topic: "{see entities[].command_topic}"
        min: "{see entities[].min}"
        max: "{see entities[].max}"
        step: "{see entities[].step}"
        unit_of_measurement: "{see entities[].unit}"
        device: "{see device_block}"

  notes:
    - "Все discovery-сообщения публикуются с retained=true — HA забирает их при подключении к broker'у."
    - "{unitStr} формируется через formatUnitId() — ha_publisher.cpp:48 — и равен 'U1'/'U2'/'U3'."
    - "Discovery-payload не содержит availability_topic — устройство онлайн-статус не публикует в HA namespace."
    - "Точные диапазоны min/max для number — ориентировочные; реальные значения смотреть в ha_publisher.cpp:429-442."

# ─────────────────────────────────────────────────────────────────────────────
# 10. BAMBU LAN MQTT (printer-side topics для прямого LAN-подключения)
# ─────────────────────────────────────────────────────────────────────────────
# Устройство выступает MQTT-клиентом локального broker'а внутри Bambu принтера.
# НЕ namespace idryer/... — это проприетарный namespace device/{serial}/... самого Bambu.
# Подключение по mqtts:// (TLS self-signed, setInsecure), auth через LAN Access Code.
# Два режима использования: Reader (только подписка + pushall запрос),
# Writer (применяет настройки фламента в AMS).
bambu_lan_mqtt:
  namespace: "device/{bambu_serial}"
  transport: "mqtts (TLS, self-signed, setInsecure)"
  port: 8883
  client_id: "idryer_{idryer_serial}"
  auth:
    username: "bblp"
    password: "{LAN Access Code из BambuConfig}"
  source_ref: "lib/idryer-core/src/integrations/bambu/bambu_client.cpp:128-130, :187-201 (старая либа: idryer-protocol/src/cloud/bambu_client.cpp — идентично)"
  topics:
    - pattern: "device/{bambu_serial}/request"
      direction: device_to_printer
      qos: 0
      retained: false
      source_ref: "bambu_client.cpp:118 (resolved), :253-275 (applyFilament), :294-303 (requestPushAll)"
      commands:
        - name: "ams_filament_setting"
          purpose: "Применить настройки филамента к слоту AMS (Writer mode)."
          source_ref: "bambu_client.cpp:253-267"
          payload:
            print:
              sequence_id: "string"
              command: "ams_filament_setting"
              ams_id: "uint8"
              tray_id: "uint8"
              tray_info_idx: "string (filament index code)"
              tray_color: "string (RRGGBBAA hex)"
              nozzle_temp_min: "uint16"
              nozzle_temp_max: "uint16"
              tray_type: "string (PLA|PETG|ABS|...)"
              setting_id: "string"
        - name: "pushall"
          purpose: "Запросить полный snapshot статуса принтера (Reader bootstrap)."
          source_ref: "bambu_client.cpp:294-303"
          payload:
            pushing:
              sequence_id: "string"
              command: "pushall"

    - pattern: "device/{bambu_serial}/report"
      direction: printer_to_device
      qos: 0
      retained: false
      source_ref: "bambu_client.cpp:119 (subscribed), :332-440 (parser)"
      payload_fields_used:
        print:
          gcode_state: "string"
          mc_percent: "number (0..100)"
          mc_remaining_time: "number (minutes → конвертируется в секунды)"
          layer_num: "number"
          total_layer_num: "number"
          nozzle_temper: "number"
          nozzle_target_temper: "number"
          bed_temper: "number"
          bed_target_temper: "number"
          chamber_temper: "number"
          chamber_target: "number"
          ams:
            tray_now: "number (если 254 → используется vt_tray)"
            ams: "array<{tray: array<{tray_type, tray_info_idx}>}>"
            vt_tray: "object (tray_type, tray_info_idx) — внешняя катушка"
      note: "Парсер игнорирует все остальные поля report'а — Bambu публикует много, нам нужны только указанные."

  notes:
    - "Подключение инициируется только когда BambuConfig.enabled=true и заполнены ip/lan_access_code/serial."
    - "Reader/Writer — это режим интеграции в нашем коде, не разные топики; оба используют те же 2 топика."
    - "TLS отключает проверку сертификата (setInsecure) — Bambu использует self-signed cert, других вариантов на LAN нет."

# ─────────────────────────────────────────────────────────────────────────────
# 11. MOONRAKER WEBSOCKET (Klipper host JSON-RPC over WS)
# ─────────────────────────────────────────────────────────────────────────────
# Устройство — WebSocket-клиент Moonraker'а на Klipper host'е.
# Транспорт — JSON-RPC 2.0 поверх WebSocket. Один outgoing method (subscribe),
# один тип входящих notifications (status update) + парсинг ответа на subscribe.
moonraker_websocket:
  transport: "WebSocket (JSON-RPC 2.0)"
  endpoint:
    url_template: "ws://{host}:{port}/websocket"
    tls_template: "wss://{host}:{port}/websocket"
    api_key_query: "?token={apiKey}  # добавляется только если apiKey задан"
    extra_headers: 'Origin: ""   # пустой Origin обязателен — иначе Moonraker отдаёт 403'
    source_ref: "lib/idryer-core/src/integrations/moonraker/moonraker_client.cpp:76-101 (старая либа: idryer-protocol/src/cloud/moonraker_client.cpp — идентично)"
  on_connect:
    method: "printer.objects.subscribe"
    purpose: "Подписаться на нужные объекты Klipper при WS-CONNECTED."
    source_ref: "moonraker_client.cpp:139, :170-202"
    request:
      jsonrpc: "2.0"
      method: "printer.objects.subscribe"
      id: "uint32 (incrementing)"
      params:
        objects:
          "gcode_macro VIRTUAL_CHAMBER": ["target", "temperature", "has_sensor"]
          "print_stats": null
          "virtual_sdcard": null
          "display_status": null
          "extruder": ["temperature", "target"]
          "heater_bed": ["temperature", "target"]
  incoming:
    - kind: notification
      method: "notify_status_update"
      source_ref: "moonraker_client.cpp:214-223"
      shape:
        jsonrpc: "2.0"
        method: "notify_status_update"
        params: "[<status_object>, <eventtime>]  # status_object — первый элемент"
    - kind: response
      matches: "id из subscribe-запроса"
      source_ref: "moonraker_client.cpp:225-234"
      shape:
        jsonrpc: "2.0"
        id: "uint32 (echoed)"
        result:
          status: "<status_object>"
    - kind: error
      source_ref: "moonraker_client.cpp:236-240"
      shape:
        jsonrpc: "2.0"
        id: "uint32 (echoed)"
        error:
          code: "integer"
          message: "string  # пишется в lastError_"
  parsed_status_fields:
    source_ref: "moonraker_client.cpp:243-358"
    "gcode_macro VIRTUAL_CHAMBER":
      target: "→ MoonrakerStatus.chamberTarget"
      temperature: "→ MoonrakerStatus.chamberTemperature"
      has_sensor: "→ MoonrakerStatus.chamberHasSensor (+ устанавливает virtualChamberAvailable)"
    print_stats:
      state: "string"
      filename: "string"
      print_duration: "number (sec)"
    display_status:
      progress: "number (0..1) — умножается на 100 в нашем коде"
    extruder:
      temperature: "→ nozzle.temperature"
      target: "→ nozzle.target"
    heater_bed:
      temperature: "→ bed.temperature"
      target: "→ bed.target"
  notes:
    - "Moonraker использует JSON-RPC 2.0, не классический MQTT — все остальные интеграции у нас через MQTT, поэтому формат отличается принципиально."
    - "Все остальные поля printer.objects (если придут в notify_status_update) игнорируются."
    - "Reconnect-логика — внешняя (см. integration manager), здесь описан только on-wire протокол."

# ─────────────────────────────────────────────────────────────────────────────
# 12. LOCAL WEBSOCKET (приложение → устройство, локальный режим без интернета)
# ─────────────────────────────────────────────────────────────────────────────
# Устройство — WebSocket-сервер. Мобильное приложение подключается к
# ws://<serial>.local:81/ (mDNS) и общается через JSON-конверт.
# Single-client policy: одновременно только один авторизованный клиент.
# Все incoming команды форвардятся в общий CommandSink — те же имена,
# что и в MQTT (см. секцию messages). Outgoing — те же payload, что в MQTT
# (publishConfig/Telemetry/Status и т.п.).
local_websocket:
  role: "server (устройство)"
  transport: "WebSocket (text frames, JSON)"
  port: 81
  path: "/"
  mdns:
    service: "_idryer._tcp"
    hostname: "{serial}.local"
  source_ref:
    current: "lib/idryer-core/src/local_access/local_access.cpp:46-47, :65, :71-74, :160-291"
    legacy: "/Users/ruslanpavlucenko/Documents/PlatformIO/Projects/idryer-link/src/WsServer.cpp:23, :77-110, :169-300"
    docs: "lib/idryer-protocol/docs/ru/07-features/02-websocket-local.md (старая либа)"
  policy:
    max_clients: 1
    on_second_connect: "Закрыть соединение второго клиента."
    auth_required_before: "command-сообщения; до auth любые сообщения отклоняются."
    auto_get_config_after_auth: true

  incoming:
    envelope: '{ "type": "<auth|command>", ... }'
    messages:
      - kind: auth
        direction: app_to_device
        source_ref: "local_access.cpp:160-194 (current); WsServer.cpp:240-282 (legacy)"
        request:
          type: "auth"
          token: "string (device_token из настроек)"
        response_ok:
          type: "auth_ok"
          deviceName: "{serial}"
        response_fail:
          type: "auth_fail"
          reason: "invalid_token | not_authorized"
      - kind: command
        direction: app_to_device
        source_ref: "local_access.cpp:200-236 (current); WsServer.cpp:286-296 (legacy)"
        request:
          type: "command"
          command: "string (имя команды — те же, что и в MQTT messages: get_config, set, invoke, ping, ...)"
          data: "object (свободная форма, форвардится в CommandSink как есть)"
        mapping:
          "get_config": "→ messages[name=get_config_cmd] (см. секцию messages)"
          "set": "→ messages[name=set_cmd]"
          "invoke": "→ messages[name=invoke_cmd]"
          "ping": "→ messages[name=ping_cmd]"
          "_general": "Любая команда, обрабатываемая CommandSink, доступна и тут."

  outgoing:
    envelope_normal: '{ "type": "<type>", "data": <payload> }'
    envelope_fragmented: '{ "type": "<type>", "data": <raw json fragments> }   # для больших payload (config) — собирается префиксом + raw + суффиксом'
    source_ref: "local_access.cpp:240-291 (current); WsServer.cpp:304-340 (legacy); device_publisher.cpp:26-64 (mapping типов)"
    types:
      - {
          type: "info",
          mqtt_suffix: "info",
          message_ref: "messages[name=info]",
        }
      - {
          type: "telemetry",
          mqtt_suffix: "telemetry",
          message_ref: "messages[name=telemetry]",
        }
      - {
          type: "status",
          mqtt_suffix: "status",
          message_ref: "messages[name=status]",
        }
      - {
          type: "config",
          mqtt_suffix: "config",
          message_ref: "messages[name=config_full]",
        }
      - {
          type: "config/delta",
          mqtt_suffix: "config/delta",
          message_ref: "messages[name=config_delta]",
        }
      - {
          type: "events",
          mqtt_suffix: "events",
          message_ref: "messages[name=events]",
        }
      - {
          type: "integrations/status",
          mqtt_suffix: "integrations/status",
          message_ref: "mqtt_only[suffix=integrations/status]",
        }
      - {
          type: "auth_ok",
          mqtt_suffix: null,
          note: "WS-only (служебный ответ)",
        }
      - {
          type: "auth_fail",
          mqtt_suffix: null,
          note: "WS-only (служебный ответ)",
        }

  notes:
    - "Payload каждого outgoing-type идентичен MQTT-аналогу — переиспользуются те же сериализаторы (publishInfo/Telemetry/Status и т.п.)."
    - "Server-flag включается через UART-команду WsEnable (kind 0x73) от RP2040 — см. uart_only."
    - "Status-сообщения о состоянии WS-сервера обратно RP2040 идут через WsStatus (0x74) и WsStatusRequest (0x76)."
    - "После успешного auth_ok сервер автоматически дёргает get_config — для bootstrap UI приложения (local_access.cpp:195-198)."
    - "Single-client: при втором подключении старый клиент остаётся, новый получает disconnect."

# ─────────────────────────────────────────────────────────────────────────────
# 13. CLOUD HTTP API (provisioning / claim flow к portal.idryer.org)
# ─────────────────────────────────────────────────────────────────────────────
# REST-API портала — единственная HTTP-коммуникация в firmware. Используется
# в bootstrap-флоу до подключения MQTT: provision → register → check-claim.
# После получения deviceId переключается на MQTT и HTTP больше не вызывается.
cloud_http_api:
  transport: "HTTPS (TLS, prod) / HTTP (staging)"
  base_url:
    production: "https://portal.idryer.org/api"
    staging: "https://staging.idryer.org/api"
    note: "Конкретный URL берётся из platformio.ini build_flag IDRYER_PORTAL_API_URL для активного окружения."
  source_ref:
    impl: "lib/idryer-protocol/src/cloud/http_api.cpp:37 (provision), :102 (register), :172 (checkClaim)"
    header: "lib/idryer-protocol/src/cloud/http_api.h:53-72"
    transport_layer: "lib/idryer-protocol/src/platform/arduino/ArduinoHttpClient.cpp:46,55,105,111"
  prerequisites:
    - "WiFi connected."
    - "NTP sync завершён (TLS требует валидное время — см. ntp_sync секцию)."
  endpoints:
    - name: provision
      method: POST
      path: "/devices/provision"
      purpose: "Первичная регистрация устройства по serial. Возвращает JWT-токен; deviceId — только если устройство уже было привязано ранее (recovery)."
      source_ref: "http_api.cpp:37-96"
      request_body:
        serialNumber: "string (hardware serial)"
      response_body:
        deviceToken: "string (JWT) — сохраняется в NVS, дальше используется для MQTT auth и check-claim"
        isNew: "bool — true если устройство впервые видим"
        isClaimed: "bool — true если уже привязано к user account (recovery)"
        deviceId: "string (UUID, optional) — присутствует только если isClaimed=true"
      idempotent: true
      called_when: "Старт устройства, если в NVS нет deviceToken (или token невалиден)."

    - name: register
      method: POST
      path: "/devices/register"
      purpose: "Запрос PIN-кода для привязки устройства к user account. PIN выводится на UI и пользователь вводит его в портал."
      source_ref: "http_api.cpp:102-166"
      request_body:
        token: "string (deviceToken от provision)"
        serialNumber: "string (optional)"
      response_body_normal:
        pin: "string (8-значный)"
        remainingSeconds: "uint32 (TTL PIN'а)"
      response_body_recovery:
        alreadyClaimed: "bool (true)"
        deviceId: "string (UUID)"
      idempotent: false
      called_when: "После provision если isClaimed=false и пользователь инициировал claim flow."

    - name: check_claim
      method: GET
      path: "/devices/check-claim/{deviceToken}"
      purpose: "Polling: проверить привязал ли пользователь устройство к account'у (PIN введён)."
      source_ref: "http_api.cpp:172-215"
      request_body: null
      response_body:
        claimed: "bool"
        deviceId: "string (UUID, optional) — присутствует только если claimed=true"
      idempotent: true
      called_when: "После register, периодический polling каждые ~5 сек до получения claimed=true (или истечения PIN)."

  error_handling:
    - "При HTTP error / parse error — `result.success=false` и retry на следующем тике."
    - "checkClaim ошибки НЕ логируются (это нормально пока не привязано) — http_api.cpp:191."

  notes:
    - "Все ответы JSON; парсятся через ArduinoJson DynamicJsonDocument."
    - "TLS на production обязателен (deviceToken — JWT, нельзя по plain HTTP)."
    - "После успешного claim — этот HTTP API больше не вызывается, вся коммуникация переходит на MQTT (idryer/{serial}/...)."
    - "ClaimStatus/ClaimComplete UART kinds (0x71/0x72) синхронизируют ESP↔RP2040 на разных стадиях этого флоу — см. messages."

# ─────────────────────────────────────────────────────────────────────────────
# 14. WIFI PROVISIONING (Improv WiFi Serial protocol)
# ─────────────────────────────────────────────────────────────────────────────
# Единственный канал передачи WiFi credentials в firmware. По Serial-порту
# (USB-CDC у ESP32-C3) пользователь через браузер с поддержкой Improv
# (или мобильное приложение) подаёт SSID/password. Никакого SoftAP,
# captive portal, BLE, SmartConfig в коде нет.
wifi_provisioning:
  protocol: "Improv WiFi (Serial)"
  library: "https://github.com/jnthas/Improv-WiFi-Library.git"
  transport: "Serial (USB-CDC, baud 115200) — тот же порт, что и логирование"
  source_ref:
    idryer: "idryer-link/src/main.cpp:54-56 (init), :332-341 (setDeviceInfo), :106-112 (callback), :395-412 (handleSerial)"
    iheater: "iHeater-link/src/main.cpp:69 (init), :160-167 (setDeviceInfo), :138-140 (callback), :284-309 (handleSerial)"
  device_info:
    chip_family: "CF_ESP32_C3"
    name_idryer: "iDryer Link"
    name_iheater: "iHeater Link"
    fw_version: "{VERSION_STRING}"
    manufacturer: "iDryer"
    bind_url: ""

  on_credentials_received:
    description: "Improv-callback при успешном получении SSID/password от клиента."
    saves_to: "NVS namespace 'wifi' (поля: 'ssid', 'password', 'configured')"
    persistence_class: "ArduinoWifiStore (lib/idryer-core/src/platform/arduino/ArduinoWifiStore.h)"
    side_effects:
      - "Сохранение credentials в NVS."
      - "WiFi.begin(ssid, password) — попытка connect."
      - "При успехе — wifiConfigured=true, главный loop переключается на нормальный режим."

  loop_blocking:
    description: "Improv handleSerial() блокирует Serial поток пока WiFi не сконфигурирован."
    side_effect: "Логирование в Serial подавляется (initArduinoHal(nullptr)) до WiFi-connect — иначе логи смешиваются с Improv-фреймами."
    re_enable_logging_at: "После успешного connect: initArduinoHal(&Serial) — hal_arduino.h:46-54."

  activation:
    production_builds: true
    staging_builds: true
    note: "Активен на ВСЕХ build env — единственный путь подачи WiFi credentials."

  notes:
    - "Альтернативные provisioning-механизмы (SoftAP+HTTP, BLE, SmartConfig, WPS) в коде НЕ реализованы."
    - "Improv-протокол поверх Serial использует binary-фреймы — клиент должен поддерживать Improv (Chrome/Edge через improv-wifi.com или соответствующее мобильное приложение)."
    - "Reset credentials — стирание NVS namespace 'wifi' (через UART-команду или factory-reset, см. uart_only)."
