    summary: "yaml mqtt_only[rfid/write_result] разрешает unitId как 'U1..U4' OR uint8 0..3. Portal pending-write lookup использует deviceId:unitId как ключ — если firmware вернёт numeric 0..3, ключ станет 'deviceId:0', а pending хранит 'deviceId:U1' → match не найдётся."
