    - name: start_drying_pc
      purpose: "Пресет: PC."
      status: implemented
      declarative_line: "iDryerRP2040/src/menu/menu_v2.yaml:971"

    - name: start_drying_pc_cf
      purpose: "Пресет: PC-CF."
      status: implemented
      declarative_line: "iDryerRP2040/src/menu/menu_v2.yaml:1002"

    - name: start_drying_my1
      purpose: "Пользовательский пресет My1."
      status: implemented
      declarative_line: "iDryerRP2040/src/menu/menu_v2.yaml:1033"

    - name: start_drying_my2
      purpose: "Пользовательский пресет My2."
      status: implemented
