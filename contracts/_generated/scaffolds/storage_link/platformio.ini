; PlatformIO config for storage_link
; Generated by contracts/gen_scaffold.py
;
; Before building:
;   1. Set upload_port / monitor_port for your device.
;   2. Adjust STORAGE_LED_PIN / STORAGE_I2C_* if applicable.

[platformio]
default_envs = storage_link-prod

[env]
platform  = espressif32
board     = esp32-c3-devkitm-1
framework = arduino
upload_port   = /dev/cu.usbmodem101
monitor_port  = /dev/cu.usbmodem101
monitor_speed = 115200
monitor_raw   = yes

lib_deps =
  bblanchon/ArduinoJson @ ^6.21.3
  knolleary/PubSubClient @ ^2.8
  https://github.com/jnthas/Improv-WiFi-Library.git
  links2004/WebSockets @ ^2.4.0

[flags_usb_cdc]
build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DDEBUG_SERIAL=Serial
  -Iinclude

[flags_prod]
build_flags =
  -DCORE_DEBUG_LEVEL=0
  -DIDRYER_API_BASE=\"https://portal.idryer.org/api\"
  -DMQTT_BROKER=\"mqtt.idryer.org\"
  -DMQTT_PORT=8883
  -DMQTT_USE_TLS=1

[flags_stage]
build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DIDRYER_API_BASE=\"https://staging.idryer.org/api\"
  -DMQTT_BROKER=\"staging.idryer.org\"
  -DMQTT_PORT=1884
  -DMQTT_USE_TLS=0

[storage_link-prod]
extra_scripts =
  pre:../../idryer-core/extra_scripts/pre_gen_menu.py
build_flags =
  ${flags_usb_cdc.build_flags}
  ${flags_prod.build_flags}

[storage_link-stage]
extra_scripts =
  pre:../../idryer-core/extra_scripts/pre_gen_menu.py
build_flags =
  ${flags_usb_cdc.build_flags}
  ${flags_stage.build_flags}
  -DIDRYER_DEV_REPL=1
