sentence=Core platform library for iDryer ESP32 devices: WiFi/cloud state machine, MQTT client, command routing, device profiles.
paragraph=Provides the shared platform layer for the iDryer device line. Handles WiFi provisioning, device claiming, MQTT session, command dispatch and the IProfile contract used by product code (Storage Link, iDryer LINK, iHeater LINK). Optional modules: UART bridge for two-MCU devices and integrations with Home Assistant, Bambu Lab, Moonraker.
